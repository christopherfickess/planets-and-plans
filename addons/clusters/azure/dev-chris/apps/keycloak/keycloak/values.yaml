# addons/clusters/azure/dev-chris/apps/keycloak/keycloak/values.yaml
# Dev-only — no TLS intentional for testbed use

# Previous auth section (plain-text creds — replaced with secret ref):
# auth:
#   adminUser: keycloak
#   adminPassword: admin-dev-password

# Previous (wrong — oci.bitnami.com does not exist, DNS fails):
# global:
#   imageRegistry: oci.bitnami.com
#   security:
#     allowInsecureImages: true

# Pin image tag — chart default may reference a tag not yet pushed to Docker Hub
# Check available tags: https://hub.docker.com/r/bitnami/keycloak/tags
image:
  tag: "26.1.4-debian-12-r0"

nameOverride: keycloak
fullnameOverride: keycloak

auth:
  adminUser: admin
  existingSecret: keycloak-db-credentials
  passwordSecretKey: keycloak-admin-password

# Use the in-cluster postgres pod — disable the bundled postgres subchart
postgresql:
  enabled: false

externalDatabase:
  host: keycloak-postgres.keycloak.svc.cluster.local
  port: 5432
  database: keycloak
  user: keycloak
  existingSecret: keycloak-db-credentials
  existingSecretPasswordKey: keycloak-dev-password

# Dev mode: disables strict hostname/TLS checks, no clustering needed
production: false
proxy: edge

service:
  type: ClusterIP
  ports:
    http: 80

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
