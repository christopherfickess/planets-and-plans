# Separate HelmRepository resource — different name to avoid conflict with postgres bitnami

# Previous (OCIRepository — not a valid sourceRef kind for HelmRelease):
# apiVersion: source.toolkit.fluxcd.io/v1beta2
# kind: OCIRepository
# metadata:
#   name: bitnami-keycloak
# spec:
#   interval: 1h
#   url: oci://registry-1.docker.io/bitnamicharts/keycloak
#   ref:
#     semver: ">=24.0.0 <25.0.0"

apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: bitnami-keycloak
spec:
  type: oci
  interval: 1h
  url: oci://registry-1.docker.io/bitnamicharts
