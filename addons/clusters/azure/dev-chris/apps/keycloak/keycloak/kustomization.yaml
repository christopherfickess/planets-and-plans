# addons/clusters/azure/dev-chris/apps/keycloak/keycloak/kustomization.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  - helmrepositories.yaml
  - release.yaml

configMapGenerator:
  - name: keycloak-values
    namespace: flux-system
    files:
      - values.yaml=values.yaml

generatorOptions:
  disableNameSuffixHash: true
