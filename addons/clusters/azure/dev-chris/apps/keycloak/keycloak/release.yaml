# Keycloak CR — managed by the Keycloak Operator (installed via operator/ subfolder).
# On first Flux reconciliation the operator CRDs may not be ready yet; Flux will retry.
# Admin credentials are auto-generated by the operator into secret: keycloak-initial-admin
#   kubectl get secret keycloak-initial-admin -n keycloak -o jsonpath='{.data.password}' | base64 -d

apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1

  db:
    vendor: postgres
    host: keycloak-postgres.keycloak.svc.cluster.local
    port: 5432
    database: keycloak
    # keycloak-admin-user value is "keycloak" — reused here as the DB username
    usernameSecret:
      name: keycloak-db-credentials
      key: keycloak-admin-user
    passwordSecret:
      name: keycloak-db-credentials
      key: keycloak-dev-password

  http:
    httpEnabled: true
    httpPort: 8080

  # Dev: disable strict hostname/backchannel checks
  hostname:
    strict: false
    strictBackchannel: false

  # Equivalent of Bitnami proxy: edge — trust X-Forwarded-* headers from the ingress
  proxy:
    headers: xforwarded
