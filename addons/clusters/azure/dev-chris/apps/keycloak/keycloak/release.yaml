# addons/clusters/azure/dev-chris/apps/keycloak/keycloak/release.yaml

# Previous (chart: . is OCIRepository syntax; wrong sourceRef kind and name):
#   chart:
#     spec:
#       chart: .
#       sourceRef:
#         kind: OCIRepository
#         name: bitnami-keycloak
# Also: dependsOn.namespace was flux-system (should be keycloak after kustomization override)

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: keycloak

  # Wait for postgres to be ready before deploying keycloak
  dependsOn:
    - name: keycloak-postgres
      namespace: keycloak

  chart:
    spec:
      chart: keycloak
      version: "24.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami-keycloak
      interval: 1h

  install:
    createNamespace: true

  upgrade:
    cleanupOnFail: true
    timeout: 10m

  valuesFrom:
    - kind: ConfigMap
      name: keycloak-values
      valuesKey: values.yaml
