# addons/clusters/azure/dev-chris/apps/keycloak/keycloak/release.yaml

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: keycloak

  # Wait for postgres to be ready before deploying keycloak
  dependsOn:
    - name: keycloak-postgres
      namespace: flux-system

  chart:
    spec:
      chart: keycloak
      version: "24.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h

  install:
    createNamespace: true

  upgrade:
    cleanupOnFail: true
    timeout: 10m

  valuesFrom:
    - kind: ConfigMap
      name: keycloak-values
      valuesKey: values.yaml
