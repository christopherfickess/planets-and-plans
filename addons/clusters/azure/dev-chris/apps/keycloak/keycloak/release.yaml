apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1

  db:
    vendor: postgres
    host: keycloak-postgres.keycloak.svc.cluster.local
    port: 5432
    database: keycloak
    # keycloak-admin-user value is "keycloak" — reused here as the DB username
    usernameSecret:
      name: keycloak-db-credentials
      key: keycloak-admin-user
    passwordSecret:
      name: keycloak-db-credentials
      key: keycloak-dev-password

  http:
    httpEnabled: true
    httpPort: 8080

    # Dev: disable strict hostname/backchannel checks
  # TODO: update hostname after terraform apply — get App Gateway FQDN with:
  #   az network public-ip show --ids $(az network application-gateway show \
  #     -n appgw-ingress -g <MC_resource_group> --query frontendIPConfigurations[0].publicIPAddress.id -o tsv) \
  #     --query dnsSettings.fqdn -o tsv
  # Must match spec.rules[0].host in service.yaml (the Ingress).
  hostname:
    hostname: keycloak.mattermost-dev-alb.eastus2.cloudapp.azure.com  # TODO: replace with actual FQDN
    strict: false
    strictBackchannel: false

  # Equivalent of Bitnami proxy: edge — trust X-Forwarded-* headers from the ingress
  proxy:
    headers: xforwarded
