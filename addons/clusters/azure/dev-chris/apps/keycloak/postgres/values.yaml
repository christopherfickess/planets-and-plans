# addons/clusters/azure/dev-chris/apps/keycloak/postgres/values.yaml
# Dev-only postgres — no persistence, plain-text creds are intentional for testbed use

# Previous (wrong — oci.bitnami.com does not exist, DNS fails):
# global:
#   imageRegistry: oci.bitnami.com
#   security:
#     allowInsecureImages: true

nameOverride: keycloak-postgres
fullnameOverride: keycloak-postgres

auth:
  database: keycloak
  username: keycloak
  existingSecret: keycloak-db-credentials
  secretKeys:
    userPasswordKey: keycloak-dev-password
    adminPasswordKey: keycloak-postgres-password

primary:
  persistence:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
