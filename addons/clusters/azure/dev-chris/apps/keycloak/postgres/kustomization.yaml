# addons/clusters/azure/dev-chris/apps/keycloak/postgres/kustomization.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  - namespaces.yaml
  - helmrepositories.yaml
  - release.yaml

configMapGenerator:
  - name: keycloak-postgres-values
    namespace: flux-system
    files:
      - values.yaml=values.yaml

generatorOptions:
  disableNameSuffixHash: true
