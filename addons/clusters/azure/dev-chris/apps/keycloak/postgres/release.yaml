# addons/clusters/azure/dev-chris/apps/keycloak/postgres/release.yaml

# Previous (had stray `type: oci` / `url:` at spec level, wrong namespace on sourceRef):
# spec:
#   type: oci
#   url: oci://registry-1.docker.io/bitnamicharts
#   ...
#   chart:
#     spec:
#       chart: postgresql
#       version: "17.6.0"
#       sourceRef:
#         kind: HelmRepository
#         name: bitnami
#         namespace: flux-system

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak-postgres
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: keycloak

  chart:
    spec:
      chart: postgresql
      version: "16.4.2"
      sourceRef:
        kind: HelmRepository
        name: bitnami
      interval: 1h

  install:
    createNamespace: true

  upgrade:
    cleanupOnFail: true
    timeout: 5m

  valuesFrom:
    - kind: ConfigMap
      name: keycloak-postgres-values
      valuesKey: values.yaml
