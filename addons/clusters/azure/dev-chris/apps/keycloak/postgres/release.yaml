# addons/clusters/azure/dev-chris/apps/keycloak/postgres/release.yaml

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak-postgres
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: keycloak

  chart:
    spec:
      chart: .
      sourceRef:
        kind: OCIRepository
        name: bitnami-postgresql
      interval: 1h

  install:
    createNamespace: true

  upgrade:
    cleanupOnFail: true
    timeout: 5m

  valuesFrom:
    - kind: ConfigMap
      name: keycloak-postgres-values
      valuesKey: values.yaml
