# addons/clusters/azure/dev-chris/apps/keycloak/operator/install.yaml
# Flux Kustomization that applies the operator CRDs and Deployment from the GitRepository.
# path: ./kubernetes — check keycloak-k8s-resources repo for the actual layout; adjust if needed.
# No targetNamespace: the operator YAML defines its own namespacing; forcing one here
# would break CRDs (cluster-scoped resources reject a namespace override).

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-operator
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: keycloak-operator
  path: ./kubernetes
  prune: true
  timeout: 5m
  wait: true
