# addons/clusters/azure/dev-chris/apps/keycloak/operator/install.yaml
# Flux Kustomization that applies the operator CRDs and Deployment from the GitRepository.
# path: ./kubernetes — check keycloak-k8s-resources repo for the actual layout; adjust if needed.
# targetNamespace: keycloak — applies to namespace-scoped resources (ServiceAccount, Deployment, etc.).
# Flux skips namespace injection on cluster-scoped resources (CRDs, ClusterRole, etc.) automatically.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-operator
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: keycloak-operator
  path: ./kubernetes
  targetNamespace: keycloak
  prune: true
  timeout: 5m
  wait: true
