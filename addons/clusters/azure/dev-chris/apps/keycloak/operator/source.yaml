# addons/clusters/azure/dev-chris/apps/keycloak/operator/source.yaml
# GitRepository for official Keycloak Kubernetes resources.
# Update the tag to match the desired Keycloak version.

apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: keycloak-operator
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/keycloak/keycloak-k8s-resources
  ref:
    tag: 26.3.2
