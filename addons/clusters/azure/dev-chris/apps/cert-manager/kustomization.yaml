# addons/clusters/azure/dev-chris/apps/cert-manager/kustomization.yaml
#
# Creates two Flux Kustomization CRs:
#   cert-manager         — installs the HelmRelease + CRDs (install/)
#   cert-manager-issuers — applies ClusterIssuers after cert-manager is ready (issuers/)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flux-system

resources:
  - cert-manager-ks.yaml
  - cert-manager-issuers-ks.yaml
