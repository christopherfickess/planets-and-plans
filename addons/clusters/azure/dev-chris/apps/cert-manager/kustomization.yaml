apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml
  - helmrepositories.yaml
  - release.yaml
  - clusterissuer.yaml

configMapGenerator:
  - name: cert-manager-values
    namespace: cert-manager
    files:
      - values.yaml=values.yaml

generatorOptions:
  disableNameSuffixHash: true
