# Flux Kustomization: applies Let's Encrypt ClusterIssuers.
# dependsOn cert-manager ensures CRDs are installed before this runs.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: planets-and-plans
  path: ./addons/clusters/azure/dev-chris/apps/cert-manager/issuers
  prune: true
  timeout: 5m
  dependsOn:
    - name: cert-manager
      namespace: flux-system
