# Flux Kustomization: installs cert-manager HelmRelease and its CRDs.
# cert-manager-issuers depends on this being ready before applying ClusterIssuers.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: planets-and-plans
  path: ./addons/clusters/azure/dev-chris/apps/cert-manager/install
  prune: true
  timeout: 5m
  wait: true
