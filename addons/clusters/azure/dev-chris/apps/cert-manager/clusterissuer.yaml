# addons/clusters/azure/dev-chris/apps/cert-manager/clusterissuer.yaml
#
# Let's Encrypt ClusterIssuers using HTTP-01 via the AGIC ingress class.
# Use letsencrypt-staging first to verify everything works, then switch
# Certificate resources to letsencrypt-prod.

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: christopher.fickess@mattermost.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: azure/application-gateway

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: christopher.fickess@mattermost.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: azure/application-gateway
