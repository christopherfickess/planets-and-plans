# addons/clusters/azure/dev-chris/apps/mattermost/saml-idp-cert.yaml
#
# Keycloak SAML signing certificate (public cert — not sensitive).
# Fetch the cert value with:
#   curl -s https://keycloak-dev-chris.dev.cloud.mattermost.com/realms/mattermost/protocol/saml/descriptor \
#     | grep -oP '(?<=<ds:X509Certificate>)[^<]+'
# Then replace the placeholder below with the output (no PEM headers needed — just the base64 block).

apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-saml-idp-cert
  namespace: mattermost
data:
  certificate: |
    -----BEGIN CERTIFICATE-----
    
    -----END CERTIFICATE-----
