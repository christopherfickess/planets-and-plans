# addons/clusters/azure/dev-chris/apps/mattermost/service.yaml
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattermost
  namespace: mattermost
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
    - host: dev-chris.dev.cloud.mattermost.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065
