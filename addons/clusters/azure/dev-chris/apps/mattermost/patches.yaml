# addons/clusters/byoc-staging-internal/apps/mattermost/patches.yaml
apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost
spec:
  replicas: 1 # Use 1 until HA license is available
  fileStore:
    externalVolume:
      volumeClaimName: mattermost-nfs-pvc
  # fileStore:
  #   external:
  #     bucket: mattermostdevchrisshare
  #     url: https://mattermostdevchris.file.core.windows.net
  #     secret: filestore
  ingress:
    enabled: false
    # Using mattermost-lb LoadBalancer service with Azure PIP instead of nginx ingress
    # CNAME: dev-chris.dev.cloud.mattermost.com -> mattermost-dev-mattermost.eastus2.cloudapp.azure.com
    host: dev-chris.dev.cloud.mattermost.com
  image: mattermost/mattermost-enterprise-fips-edition
  mattermostEnv:
    # SAML — Keycloak (mattermost realm, SAML client)
    - name: MM_SAMLSETTINGS_ENABLE
      value: "true"
    - name: MM_SAMLSETTINGS_VERIFY
      value: "true"
    - name: MM_SAMLSETTINGS_ENCRYPT
      value: "false"
    - name: MM_SAMLSETTINGS_SIGNREQUEST
      value: "false"
    - name: MM_SAMLSETTINGS_IDPURL
      value: "https://keycloak-dev-chris.dev.cloud.mattermost.com/realms/mattermost/protocol/saml"
    - name: MM_SAMLSETTINGS_IDPDESCRIPTORURL
      value: "https://keycloak-dev-chris.dev.cloud.mattermost.com/realms/mattermost"
    - name: MM_SAMLSETTINGS_IDPMETADATAURL
      value: "https://keycloak-dev-chris.dev.cloud.mattermost.com/realms/mattermost/protocol/saml/descriptor"
    - name: MM_SAMLSETTINGS_ASSERTIONCONSUMERSERVICEURL
      value: "https://dev-chris.dev.cloud.mattermost.com/login/sso/saml"
    - name: MM_SAMLSETTINGS_SERVICEPROVIDERIDENTIFIER
      value: "https://dev-chris.dev.cloud.mattermost.com"
    - name: MM_SAMLSETTINGS_LOGINBUTTONTEXT
      value: "Login with Keycloak"
    # - name: MM_SAMLSETTINGS_IDPCERTIFICATEFILE
    #   value: "/mattermost/config/saml/idp.crt"
    - name: MM_SAMLSETTINGS_EMAILATTRIBUTE
      value: "Email"
    - name: MM_SAMLSETTINGS_USERNAMEATTRIBUTE
      value: "Username"
    - name: MM_SAMLSETTINGS_FIRSTNAMEATTRIBUTE
      value: "FirstName"
    - name: MM_SAMLSETTINGS_LASTNAMEATTRIBUTE
      value: "LastName"
    # base configuration
    - name: MM_SITEURL
      value: "https://dev-chris.dev.cloud.mattermost.com"
    - name: MM_FILESETTINGS_DRIVERNAME
      value: "local"
    - name: MM_FILESETTINGS_AMAZONS3SSE
      value: "false"
    - name: MM_FILESETTINGS_AMAZONS3SSL
      value: "false"
    - name: MM_LICENSE
      value: ""
    # Reduce log noise in dev
    - name: MM_CLUSTERSETTINGS_ENABLE
      value: "false"
    - name: MM_EMAILSETTINGS_SMTPSERVER
      value: ""
    - name: MM_PLUGINSETTINGS_PLUGINSTATES
      value: '{"com.mattermost.calls":{"Enable":false},"mattermost-ai":{"Enable":false}}'
  volumes:
    - name: saml-idp-cert
      configMap:
        name: keycloak-saml-idp-cert
  volumeMounts:
    - name: saml-idp-cert
      mountPath: /mattermost/config/saml
      readOnly: true
    - name: saml-idp-cert
      mountPath: /etc/ssl/certs/staging-ca.pem
      subPath: staging-ca.pem # mounts just this file, not the whole configmap
      readOnly: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mattermost
$patch: delete
