# grafana/alloy v1.7.0 CRDs
# Source: charts/crds/crds/ inside the grafana/alloy chart (subchart, not top-level crds/)
#
# To populate this folder, run:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm pull grafana/alloy --version <new> --untar --destination /tmp/alloy-chart
#   cp /tmp/alloy-chart/alloy/charts/crds/crds/*.yaml <this dir>/podlogs.yaml
#
# When upgrading: bump the version above, re-run the commands, overwrite the files,
# and commit alongside the chart version bump in addons/values.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # PodLogs CRD — used by loki.source.podLogs component (monitoring.grafana.com/v1alpha2)
  # Note: our River config uses loki.source.kubernetes (direct API, no CRD required),
  # but the CRD must still be present because crds.create: false tells the chart to
  # skip installing it, and the chart will fail to start if the CRD is missing entirely.
  - podlogs.yaml
