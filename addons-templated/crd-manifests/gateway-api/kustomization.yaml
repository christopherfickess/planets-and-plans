# Gateway API v1.2.1 CRDs — required by Cilium gatewayAPI.enabled: true
# Provides: GatewayClass, Gateway, HTTPRoute, GRPCRoute, ReferenceGrant
#
# To upgrade: download the new standard-install.yaml from
#   https://github.com/kubernetes-sigs/gateway-api/releases
# Split into one file per CRD and update the resources list below.
# Commit alongside any Cilium version bump.
#
# Version compatibility with Cilium:
#   https://docs.cilium.io/en/stable/network/servicemesh/gateway-api/gateway-api/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - gatewayclasses.yaml
  - gateways.yaml
  - grpcroutes.yaml
  - httproutes.yaml
  - referencegrants.yaml
