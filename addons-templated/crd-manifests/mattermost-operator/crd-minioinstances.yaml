# MinIOInstance CRD (miniocontroller.min.io/v1beta1)
#
# The Mattermost operator v1.24.0 unconditionally checks for MinIOInstance
# resources during reconciliation. Without this CRD, the check returns
# "no matches for kind" which is treated as a hard error and blocks the
# Mattermost pod from ever being created.
#
# Installing just this CRD (without the MinIO operator) allows the check
# to return "not found" instead — which the operator handles gracefully
# and continues to deploy Mattermost with external S3.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: minioinstances.miniocontroller.min.io
spec:
  group: miniocontroller.min.io
  scope: Namespaced
  names:
    plural: minioinstances
    singular: minioinstance
    kind: MinIOInstance
    listKind: MinIOInstanceList
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
