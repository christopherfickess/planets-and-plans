# ==============================================================================
# Flux Addons — Master Values (chart defaults)
#
# PURPOSE OF THIS FILE
# --------------------
# This is the Helm chart's built-in values.yaml — the base layer that defines
# every configurable setting and its default value.
#
# It is NOT deployed directly. Helm always merges this file first, then applies
# the cluster-specific override on top:
#
#   addons/values.yaml                   ← you are here (base defaults)
#           +
#   cluster-overrides/<env>/values.yaml  ← only what differs per cluster
#           =
#   final values used to render templates
#
# WHAT BELONGS HERE
# -----------------
# - Complete schema: every key a template might read must have a default here
# - Conservative defaults: everything disabled, single replicas, no HA
# - Chart repo URLs and chart names (these never change per-env)
# - Chart versions as fallback reference (env overrides take precedence in practice)
#
# CHART VERSIONS
# --------------
# Chart versions are pinned in each cluster-overrides/<env>/values.yaml so
# upgrades can be promoted gradually: bump dev → verify → bump staging → bump prod.
# The versions here act as fallback defaults if an env override omits them.
#
# WHAT DOES NOT BELONG HERE
# -------------------------
# - Real account numbers, cluster names, bucket names — use env overrides
# - Production-scale settings (HA, large storage) — use prod override
# - Env-specific hostnames, ARNs, tokens, subnets — use env overrides
# ==============================================================================

global:
  helmRepoInterval: 1h # how often Flux polls Helm repos for new chart versions
  helmReleaseInterval: 1h # how often Flux re-applies HelmReleases
  upgradeTimeout: 10m # abort a Helm upgrade after this duration
  upgradeRetries: 3 # retries before marking HelmRelease as failed

  # AWS account details — used by templates to construct IRSA role ARNs:
  #   arn:aws:iam::<accountNumber>:role/<clusterName>-<app.irsaRoleSuffix>
  aws:
    accountNumber: "" # 12-digit AWS account ID
    clusterName: "" # must match the EKS cluster name exactly
    region: us-east-2 # AWS region for all addons unless overridden per-app

# ------------------------------------------------------------------------------
# Grafana Alloy — log collection and forwarding to Loki
#
# Runs as a DaemonSet on every node. Discovers pods via the Kubernetes API,
# relabels streams (namespace / pod / container), and pushes to Loki.
# Set loki.endpoint to the Loki gateway in whichever cluster hosts it.
# ------------------------------------------------------------------------------
alloy:
  enabled: false
  namespace: monitoring

  chart:
    name: alloy
    version: "0.12.5"
    repo:
      name: grafana
      type: default
      url: https://grafana.github.io/helm-charts

  # Identity labels stamped on every log stream — used by Loki for multi-cluster filtering.
  # clusterName defaults to global.aws.clusterName when blank.
  clusterName: ""
  customer: "" # e.g. "internal", "acme" — omitted from streams when blank
  environment: "" # e.g. "dev", "staging", "prod" — omitted from streams when blank

  controller:
    type: daemonset # "daemonset" (default) or "deployment" for a fixed replica count

  updateStrategy:
    type: RollingUpdate
    maxUnavailable: 1 # replace one DaemonSet pod at a time during upgrades

  crds:
    create: false # CRDs are managed externally via crds/alloy/ — do not change

  serviceAccount:
    create: true
    name: alloy # must match the IRSA annotation target if IRSA is used

  loki:
    # ── Loki endpoint — pick ONE scenario, comment out the others ────────────
    #
    # SCENARIO 1: Loki in the same cluster (most common)
    # Alloy reaches Loki via cluster-internal DNS — no HTTPRoute or Ingress
    # needed on either side. Replace <namespace> with the Loki namespace.
    #
    #   endpoint: "http://loki-gateway.<namespace>.svc.cluster.local/loki/api/v1/push"
    #
    # SCENARIO 2: Loki in a different cluster (hub-spoke)
    # Loki must expose its push endpoint externally via HTTPRoute or Ingress
    # on its own cluster. Alloy just uses the external URL. No routing
    # resources are needed on the Alloy side for this to work.
    #
    #   endpoint: "https://loki-gateway.monitoring.other-cluster.example.com/loki/api/v1/push"
    #
    # SCENARIO 3: Grafana Cloud or any managed Loki SaaS
    # Requires basic auth — see basicAuth block below.
    #
    #   endpoint: "https://logs-prod-us-central1.grafana.net/loki/api/v1/push"
    #
    endpoint: ""

    # X-Scope-OrgID header — identifies this cluster's log streams in a
    # multi-tenant Loki deployment. Defaults to blank (single-tenant mode).
    # Set to global.aws.clusterName or a stable identifier for this cluster.
    tenantID: ""

    tls:
      insecureSkipVerify: false # set true only for self-signed Loki certs (scenario 2)

    # ── Basic auth — required for Grafana Cloud and some managed Loki deployments
    #
    # The password is read from a K8s Secret in the alloy namespace via envFrom.
    # The Secret must have a key named LOKI_PASSWORD.
    #
    # Two ways to create that Secret — pick one:
    #
    # OPTION A: Manual Secret (simplest)
    #   kubectl create secret generic loki-basic-auth \
    #     --from-literal=LOKI_PASSWORD=<your-password> \
    #     -n monitoring
    #
    # OPTION B: ExternalSecret (recommended when externalSecrets.enabled: true)
    #   Create an ExternalSecret in the monitoring namespace that pulls the
    #   password from AWS Secrets Manager and maps it to key LOKI_PASSWORD:
    #
    #   apiVersion: external-secrets.io/v1
    #   kind: ExternalSecret
    #   metadata:
    #     name: loki-basic-auth
    #     namespace: monitoring
    #   spec:
    #     refreshInterval: 1h
    #     secretStoreRef:
    #       kind: ClusterSecretStore
    #       name: aws-secretsmanager
    #     target:
    #       name: loki-basic-auth
    #       creationPolicy: Owner
    #     data:
    #       - secretKey: LOKI_PASSWORD
    #         remoteRef:
    #           key: "prod/loki-credentials"   # SM secret path
    #           property: password              # SM secret property
    #
    # basicAuth:
    #   username: ""                  # Grafana Cloud user ID or Loki username
    #   passwordSecretRef:
    #     name: loki-basic-auth       # K8s Secret name — created via Option A or B above

  extraEnv: [] # additional env vars injected into the Alloy container
  extraAlloyConfig: "" # appended verbatim after the generated River config block

  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: utilities
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: monitoring
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: calls
      operator: Equal
      value: "true"
      effect: NoSchedule

  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      cpu: 500m
      memory: 2000Mi # Alloy buffers log streams in memory — keep headroom on busy nodes

  # ── Routing ────────────────────────────────────────────────────────────────
  # Choose ONE of the two options below — do not enable both simultaneously.
  #
  # httproute: use when the cluster has a Gateway API controller (Cilium)
  # ingress:   use for clusters with a traditional ingress controller (nginx,
  #            or AWS ALB Ingress Controller with alb ingressClassName)
  #
  # ALB + Route53 via ingress annotations example:
  #   ingressClass: alb
  #   annotations:
  #     alb.ingress.kubernetes.io/scheme: internal
  #     alb.ingress.kubernetes.io/target-type: ip
  #     alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
  #     alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:..."
  #     external-dns.alpha.kubernetes.io/hostname: alloy.dev.cloud.mattermost.com
  #
  # Exposes the Alloy UI (port 12345) — useful for debugging River config and
  # checking component health. Restrict access in prod.
  httproute:
    enabled: false
    host: "" # e.g. alloy.dev.cloud.mattermost.com
    gatewayName: cilium-gateway
    gatewayNamespace: kube-system

  ingress:
    enabled: false
    host: "" # e.g. alloy.dev.cloud.mattermost.com
    ingressClass: nginx-controller # swap to "alb" for AWS ALB Ingress Controller
    annotations: {} # add external-dns, alb, or cert-manager annotations here
    tlsSecretName: "" # omit for ALB (TLS is terminated at the ALB, not in-cluster)

  extraValues: {}

# ------------------------------------------------------------------------------
# AWS Load Balancer Controller — provisions ALBs/NLBs from Kubernetes Ingress
#
# Runs in kube-system (pre-existing namespace — no Namespace resource created).
# Requires an IRSA role with elasticloadbalancing:* and ec2:Describe* permissions.
# ha: true pins replicaCount to 2 and adds a PodDisruptionBudget.
# ------------------------------------------------------------------------------
awsLoadBalancerController:
  enabled: false
  namespace: kube-system

  chart:
    name: aws-load-balancer-controller
    version: "1.11.0"
    repo:
      name: eks
      type: default
      url: https://aws.github.io/eks-charts

  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "aws-load-balancer-controller"

  vpcID: "" # leave blank to auto-detect from EC2 instance metadata

  ha: false # set true for production — forces replicaCount to 2 + PodDisruptionBudget
  replicaCount: 1 # ignored when ha: true (pinned to 2)

  nodeSelector: {}
  tolerations: []

  enableWebhook: true # set false if the EKS control plane cannot reach the webhook ClusterIP

  extraValues: {}

# ------------------------------------------------------------------------------
# Cluster Autoscaler — scales EKS node groups based on pending pod demand
#
# Runs in kube-system (pre-existing namespace — no Namespace resource created).
# Requires an IRSA role with autoscaling:Describe*/SetDesiredCapacity permissions.
# Uses auto-discovery: node groups must be tagged:
#   k8s.io/cluster-autoscaler/enabled = "true"
#   k8s.io/cluster-autoscaler/<clusterName> = "owned"
# ------------------------------------------------------------------------------
clusterAutoscaler:
  enabled: false
  namespace: kube-system

  chart:
    name: cluster-autoscaler
    version: "9.54.0"
    repo:
      name: autoscaler
      type: default
      url: https://kubernetes.github.io/autoscaler

  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "cluster-autoscaler"

  replicaCount: 1 # one instance is enough; autoscaler is not HA by design

  expander: least-waste # picks the node group that wastes the least capacity
  balanceSimilarGroups: true
  skipNodesWithSystemPods: false

  scaleDown:
    enabled: true
    delayAfterAdd: 10m # wait before considering scale-down after a scale-up
    delayAfterDelete: 10s # wait before considering the next node removal
    unneededTime: 10m # node must be unused for this long before removal
    utilizationThreshold: "0.5" # remove nodes below 50% CPU+memory utilization

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Cilium Gateway — ALB → Cilium Gateway API bridge
#
# Sets up a Cilium-managed GatewayClass (NodePort) and a single Gateway that
# all HTTPRoutes attach to. An ALB Ingress fronts the Gateway NodePort service
# so external HTTPS traffic flows: ALB → Cilium Gateway → HTTPRoute → pod.
#
# Requires: awsLoadBalancerController.enabled: true
# Requires: Cilium installed with gatewayAPI.enabled: true (default in cni.tf)
# ------------------------------------------------------------------------------
ciliumGateway:
  enabled: false

  alb:
    hostname: "" # e.g. "*.dev.mattermost.cloud" — required to render the Ingress
    certArn: "" # ACM certificate ARN for HTTPS
    wafArn: "" # WAFv2 ACL ARN — leave blank to skip WAF
    subnets: "" # comma-separated public subnet IDs for the ALB
    extraTags: "" # appended to ManagedBy=flux, e.g. ",Environment=dev,Customer=acme"

# ------------------------------------------------------------------------------
# External Secrets Operator — syncs K8s Secrets from AWS Secrets Manager
#
# Requires an IRSA role with secretsmanager:GetSecretValue + DescribeSecret.
# After install, a ClusterSecretStore points at the AWS region so that
# ExternalSecret resources in any namespace can pull values by ARN or name.
# ------------------------------------------------------------------------------
externalSecrets:
  enabled: false
  namespace: external-secrets

  chart:
    name: external-secrets
    version: "0.17.0"
    repo:
      name: external-secrets
      type: default
      url: https://charts.external-secrets.io

  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "external-secrets"

  ha: false # set true for production — forces replicaCount to 2 + PodDisruptionBudget
  replicaCount: 1 # ignored when ha: true (pinned to 2)

  # Webhook and cert-controller — disabled by default on EKS because the managed
  # control plane runs outside the Cilium network boundary and cannot reach in-cluster
  # webhook ClusterIP endpoints. Enable only if control-plane → pod IP connectivity
  # is confirmed (e.g. non-EKS clusters or clusters with explicit webhook routing).
  webhook:
    create: false
  certController:
    create: false

  # Emit a ClusterSecretStore so any namespace can pull secrets without specifying a store
  clusterSecretStore:
    enabled: false
    name: aws-secretsmanager
    region: us-east-2
    serviceAccountRef: external-secrets

  extraValues: {}

# ------------------------------------------------------------------------------
# Fluent Bit — DaemonSet that ships container / audit logs to S3
#
# Reads /var/log/containers/*.log on every node, enriches records with pod
# metadata (namespace, pod name, container name), and writes gzip-compressed
# files to S3.
#
# Requires an IRSA role with s3:PutObject on the target bucket.
# ------------------------------------------------------------------------------
fluentBit:
  enabled: false
  namespace: fluent-bit

  chart:
    name: fluent-bit
    version: "0.48.9"
    repo:
      name: fluent
      type: default
      url: https://fluent.github.io/helm-charts

  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "fluent-bit"

  customer: "" # label added to every audit log record; defaults to global.aws.clusterName

  s3:
    bucket: "" # name of the S3 bucket — must exist; Fluent Bit does not create it
    region: us-east-2
    prefix: "audit-logs" # S3 key prefix — produces /<prefix>/year=.../month=.../...uuid.gz
    totalFileSize: "100M" # flush after accumulating this much data per file
    uploadTimeout: "10m" # flush after this time even if size not reached

  tolerations:
    - operator: Exists # DaemonSet — collect from ALL nodes including tainted ones

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  extraValues: {}

# ------------------------------------------------------------------------------
# Loki — log aggregation and storage
#
# Receives log streams from Alloy (or any Promtail/Alloy agent), stores them
# in S3, and exposes a LogQL query API consumed by Grafana.
#
# DEPLOYMENT MODE
# ---------------
# SingleBinary  — all components in one pod. Simple, low-overhead.
#                 Good for single-cluster setups and testing.
# SimpleScalable — split into read + write tiers. Step up when SingleBinary
#                  can't keep up with ingest rate.
# Distributed   — full microservices. Use only at large scale.
#
# AUTH
# ----
# authEnabled: true  — multi-tenant; every push/query must include
#                       X-Scope-OrgID (alloy.loki.tenantID). Keeps log
#                       streams from different clusters/tenants isolated.
# authEnabled: false — single-tenant; header is ignored. Simpler for
#                       single-cluster setups with one consumer.
#
# HTTPROUTE / INGRESS
# -------------------
# Only required when Alloy or Grafana lives in a DIFFERENT cluster and
# needs to reach this Loki instance externally. When Alloy and Grafana
# are co-located with Loki, they use the internal gateway DNS:
#   http://loki-gateway.<namespace>.svc.cluster.local
#
# Requires an IRSA role with:
#   s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket on the S3 bucket.
# ------------------------------------------------------------------------------
loki:
  enabled: false
  namespace: monitoring

  chart:
    name: loki
    version: "6.12.0"
    repo:
      name: grafana   # shared with alloy and grafana — only one HelmRepository is created
      type: default
      url: https://grafana.github.io/helm-charts

  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "loki"

  authEnabled: true   # true = multi-tenant (requires X-Scope-OrgID); false = single-tenant

  deploymentMode: SingleBinary   # SingleBinary | SimpleScalable | Distributed
  replicationFactor: 1           # set 3 for HA in SimpleScalable or Distributed mode
  replicas: 1                    # singleBinary replicas — ignored in other modes

  s3:
    bucket: ""   # S3 bucket name — must exist; Loki does not create it
    region: ""   # defaults to global.aws.region when blank

  # ── StorageClass — Loki-owned EBS gp3 StorageClass ──────────────────
  # Creates a dedicated StorageClass for the singleBinary StatefulSet PVC.
  # Required on clusters without a default StorageClass (e.g. no gp2/gp3 default).
  # Leave disabled and set persistence.storageClass to use an existing class instead.
  storageClass:
    enabled: false  # set true to create the loki-gp3 StorageClass
    name: loki-gp3
    iops: ""        # blank = gp3 baseline (3000)
    throughput: ""  # blank = gp3 baseline (125 MiB/s)

  # PVC for WAL and TSDB index cache (singleBinary only).
  persistence:
    size: 10Gi
    storageClass: ""   # blank = cluster default; set to storageClass.name when enabled above

  # Loki gateway — nginx reverse proxy that routes push and query requests
  # to the correct internal component. Always keep enabled.
  gateway:
    enabled: true
    replicas: 1

  # Log retention — compactor runs automatically in SingleBinary mode.
  # Set enabled: true and configure period to enforce a retention window.
  retention:
    enabled: false
    period: "744h"   # 31 days — compactor enforces this across all streams

  # ── Routing — pick ONE or neither ──────────────────────────────────────
  # Only needed for cross-cluster access (Alloy or Grafana in another cluster).
  # Same-cluster consumers use: http://loki-gateway.<namespace>.svc.cluster.local
  #
  # httproute: use when the cluster has a Gateway API controller (Cilium)
  # ingress:   use for clusters with a traditional ingress controller (nginx/ALB)
  httproute:
    enabled: false
    host: ""   # e.g. loki.dev.example.com
    gatewayName: cilium-gateway
    gatewayNamespace: kube-system

  ingress:
    enabled: false
    host: ""   # e.g. loki.dev.example.com
    ingressClass: nginx-controller
    annotations: {}
    tlsSecretName: ""

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Grafana — standalone dashboards
#
# Disabled by default — kube-prometheus-stack ships its own sidecar Grafana.
# Enable this only if you need a separately managed Grafana instance
# (e.g. to aggregate dashboards from multiple clusters).
# ------------------------------------------------------------------------------
grafana:
  enabled: false
  namespace: monitoring

  chart:
    name: grafana
    version: "10.5.15"
    repo:
      name: grafana # shared repo with alloy; both produce HelmRepository "grafana"
      type: default
      url: https://grafana.github.io/helm-charts

  # ── Admin credentials — pick one approach ───────────────────────────
  # Option 1: ExternalSecret (recommended) — requires externalSecrets.enabled: true
  #   Set adminExternalSecret.secretKey to the AWS Secrets Manager key path.
  adminExternalSecret:
    secretKey: "" # AWS Secrets Manager key path, e.g. "grafana/admin"
    userProperty: "admin-user"
    passwordProperty: "admin-password"

  # Option 2: Auto-generated secret (default) — grafana-auth.yaml creates it on first install.
  #   Swap to adminExternalSecret when externalSecrets is enabled.
  adminPasswordSecretRef:
    name: grafana-admin-secret
    key: admin-password

  replicas: 1

  # ── StorageClass — grafana-owned EBS gp3 StorageClass ───────────────
  # Creates a dedicated StorageClass for the postgres StatefulSet PVC.
  # Required when postgres.internal.enabled is true on clusters without a default StorageClass.
  storageClass:
    enabled: false # set true when postgres.internal is enabled
    name: grafana-gp3
    iops: "" # blank = gp3 baseline (3000) — raise for write-heavy DB workloads
    throughput: "" # blank = gp3 baseline (125 MiB/s)

  # SQLite persistence — only used when postgres is disabled.
  # Suppressed automatically by the template when postgres.internal or external is enabled.
  persistence:
    enabled: false
    size: 10Gi
    storageClass: "" # leave blank — picked up from storageClass.name when enabled

  datasources: [] # pre-configure datasources per env; add Prometheus/Thanos endpoints

  # ── Routing — pick ONE of httproute or ingress ──────────────────────
  # httproute: use when the cluster has a Gateway API controller (Cilium)
  # ingress:   use for clusters with a traditional ingress controller (nginx)
  httproute:
    enabled: false
    host: "" # e.g. grafana.dev.example.com
    gatewayName: cilium-gateway
    gatewayNamespace: kube-system

  ingress:
    enabled: false
    host: ""
    ingressClass: nginx-controller
    tlsSecretName: "" # populated by cert-manager or external-secrets
    annotations: {}

  # ── Postgres database — pick one mode ───────────────────────────────
  # internal: in-cluster StatefulSet; external: RDS/Aurora; neither: SQLite on PVC
  # Do not enable both at the same time — internal takes precedence if both set.
  postgres:
    internal:
      enabled: false
      username: grafana
      randomPassword: true # auto-generate and persist; set false to use an explicit password
      password: "" # only used when randomPassword: false
      storage: 10Gi # PVC size — increase for production (50Gi–200Gi typical)
      storageClass: "" # leave blank — use grafana.storageClass.enabled instead
      resources: {} # set requests/limits for production

    external:
      enabled: false
      host: "" # DB hostname, e.g. grafana.abc123.us-east-2.rds.amazonaws.com
      port: 5432
      database: grafana
      username: grafana
      # Secret holding the DB password — must exist before Grafana starts.
      # Create manually or point at a secret managed by ExternalSecret.
      existingSecret:
        name: grafana-database # default matches the in-cluster secret name
        key: POSTGRES_PASSWORD

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Mattermost instances — deployed via the Mattermost Operator
#
# Each entry under `instances` produces a full set of resources:
#   Namespace, ServiceAccount (IRSA), Mattermost CR, and HTTPRoute.
#   Plus one of the database modes below.
#
# Add as many instances as needed — each gets its own isolated namespace.
# Requires: mattermostOperator.enabled: true
#
# DATABASE MODES (pick one per instance):
#
#   postgres.enabled: true
#     Deploys an in-cluster Postgres StatefulSet + Service.
#     Credentials are auto-generated on first install and preserved across upgrades.
#     Good for: dev/testing, no-RDS environments.
#
#   db.externalSecret.secretKey set + top-level externalSecrets.enabled: true
#     Pulls the connection string from AWS Secrets Manager via ExternalSecret.
#     Good for: production, staging.
#
#   neither
#     Expects a pre-existing Secret named "database" in the instance namespace
#     with keys: DB_CONNECTION_STRING, DB_CONNECTION_CHECK_URL, MM_CONFIG,
#     MM_SQLSETTINGS_DATASOURCEREPLICAS.
#
# LICENSE MODES (pick one per instance):
#
#   license.externalSecret.secretKey set + top-level externalSecrets.enabled: true
#     Pulls the license from AWS Secrets Manager via ExternalSecret.
#
#   neither
#     Expects a pre-existing Secret named "mattermost-license" in the namespace
#     with key: license.
#
# Example:
#
#   mattermost:
#     instances:
#       my-workspace:
#         namespace: mattermost-my-workspace
#         version: "10.5.1"
#         replicas: 1
#         host: "mattermost.example.com"
#         irsaRoleSuffix: "mattermost-my-workspace"
#         fileStore:
#           mode: s3
#           s3:
#             bucket: "my-cluster-app-data"
#         postgres:
#           enabled: true
#           storage: 10Gi
#           storageClass: ""
#           username: mattermost
#           randomPassword: true
#           password: ""
#         db:
#           externalSecret:         # only when top-level externalSecrets.enabled: true
#             secretKey: "my-cluster-app-mattermost"
#             property: "DB_CONNECTION_STRING"
#         license:
#           externalSecret:         # only when top-level externalSecrets.enabled: true
#             secretKey: "mattermost-license-store"
#             property: "license"
#         httproute:
#           enabled: true
#           gatewayName: cilium-gateway
#           gatewayNamespace: kube-system
#         ingress:
#           enabled: false
#           ingressClass: nginx
#           tlsSecret: ""
#           annotations: {}
# ------------------------------------------------------------------------------
mattermost:
  instances: {}
  extraValues: {}

# ------------------------------------------------------------------------------
# Mattermost Operator — manages MattermostCluster CRDs
#
# Required before deploying any Mattermost workspace.
# ------------------------------------------------------------------------------
mattermostOperator:
  enabled: false
  namespace: mattermost-operator

  chart:
    name: mattermost-operator
    version: "1.0.4"
    repo:
      name: mattermost
      type: default
      url: https://helm.mattermost.com

  replicaCount: 1
  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Metrics Server — enables `kubectl top` and Horizontal Pod Autoscaler
#
# Runs in kube-system (pre-existing namespace — no Namespace resource created).
# ha: true → replicaCount forced to 2 + PodDisruptionBudget.
# ------------------------------------------------------------------------------
metricsServer:
  enabled: false
  namespace: kube-system

  chart:
    name: metrics-server
    version: "3.12.1"
    repo:
      name: metrics-server
      type: default
      url: https://kubernetes-sigs.github.io/metrics-server/

  replicaCount: 1
  ha: false # set true for production — forces replicaCount to 2 + PodDisruptionBudget

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# NGINX Ingress Controller — CloudFlare-fronted external ingress
#
# cloudflare.enabled: true restricts the LoadBalancer source ranges to
# CloudFlare edge IPs + RFC1918. This prevents direct access bypassing CF.
# ssl.forceRedirect: true adds the "ssl-redirect" annotation to all Ingresses.
# autoscaling scales controller replicas based on CPU/memory utilisation.
# ------------------------------------------------------------------------------
nginx:
  enabled: false
  namespace: ingress-nginx

  chart:
    name: ingress-nginx
    version: "4.12.1"
    repo:
      name: ingress-nginx
      type: default
      url: https://kubernetes.github.io/ingress-nginx

  ha: false # set true for production — forces replicaCount to 2 + hard anti-affinity
  replicaCount: 1 # ignored when ha: true (pinned to 2)

  ingressClass: nginx-controller # must match the className: field on Ingress resources
  ingressClassController: k8s.io/ingress-nginx

  # Restrict external LB to Cloudflare edge IP blocks — blocks direct (non-CF) traffic
  # Full IP list: https://www.cloudflare.com/ips/
  cloudflare:
    enabled: false # set true when traffic flows through Cloudflare
    ipRanges:
      - 10.0.0.0/8
      - 173.245.48.0/20
      - 103.21.244.0/22
      - 103.22.200.0/22
      - 103.31.4.0/22
      - 141.101.64.0/18
      - 108.162.192.0/18
      - 190.93.240.0/20
      - 188.114.96.0/20
      - 197.234.240.0/22
      - 198.41.128.0/17
      - 162.158.0.0/15
      - 104.16.0.0/13
      - 104.24.0.0/14
      - 172.64.0.0/13
      - 131.0.72.0/22

  ssl:
    forceRedirect: true # HTTP → HTTPS; disable if redirects are handled at the LB or CDN level

  customErrors:
    enabled: false # set true to show custom error pages instead of default NGINX ones
    code403Url: "" # URL to redirect 403s to

  autoscaling:
    enabled: false # set true to scale based on CPU/memory; disable for fixed replica count
    minReplicas: 2
    maxReplicas: 15
    targetCPU: 300 # scale up when CPU exceeds 300%
    targetMemory: 300 # scale up when memory exceeds 300%

  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
    limits:
      cpu: 4000m
      memory: 6Gi

  tolerations: []

  service:
    annotations: {} # e.g. AWS NLB: service.beta.kubernetes.io/aws-load-balancer-type: external

  extraValues: {}

# ------------------------------------------------------------------------------
# Prometheus (kube-prometheus-stack) — cluster-wide metrics with Thanos sidecar
#
# The Thanos sidecar streams TSDB blocks to S3 so Prometheus only needs 4h
# local retention. Long-term queries go through Thanos Query (see thanos:).
#
# storageClass "prometheus-gp3" is created by templates/prometheus/storageclass.yaml
# using EBS gp3 with WaitForFirstConsumer and Retain reclaim policy.
#
# Requires an IRSA role with s3:PutObject/GetObject/DeleteObject on the
# Thanos object storage bucket.
# ------------------------------------------------------------------------------
prometheus:
  enabled: false
  namespace: monitoring

  chart:
    name: kube-prometheus-stack
    version: "61.8.0"
    repo:
      name: prometheus-community
      type: default
      url: https://prometheus-community.github.io/helm-charts

  # Thanos sidecar needs S3 access — arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "thanos"

  clusterID: "" # defaults to global.aws.clusterName; used as externalLabels.clusterID in Thanos

  ha: false # set true for production — forces replicaCount to 2 + hard pod anti-affinity
  replicaCount: 1 # ignored when ha: true (pinned to 2)

  retention: "4h" # keep short when Thanos handles long-term storage
  storageSize: "50Gi" # increase for clusters with more metrics cardinality
  storageClass: "prometheus-gp3" # created by templates/prometheus/storageclass.yaml

  thanos:
    enabled: false # enable when thanos-objstore-config secret is present
    objectStorageSecret: "thanos-objstore-config"

  alertmanager:
    enabled: false

  grafana:
    enabled: false # use standalone grafana: section above

  nodeSelector: {}
  tolerations: []

  additionalServiceMonitors: [] # ServiceMonitors injected verbatim — add per-workload scrape targets

  extraValues: {}

# ------------------------------------------------------------------------------
# RTCD — Mattermost Real-Time Communications Daemon (Calls plugin backend)
#
# Disabled by default; only enable in clusters that host the Calls plugin.
# Requires mattermost-operator to be installed first (HelmRelease dependsOn).
# Calls traffic uses UDP/TCP on rtcPort — ensure SG/NLB allows it.
# ------------------------------------------------------------------------------
rtcd:
  enabled: false
  namespace: mattermost-rtcd

  chart:
    name: mattermost-rtcd
    version: "1.4.1"
    repo:
      name: mattermost # shared repo with mattermost-operator
      type: default
      url: https://helm.mattermost.com

  replicaCount: 1
  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  # Only needed when using External Secrets to pull the RTCD API key from Secrets Manager.
  irsaRoleSuffix: ""
  rtcPort: 8443 # WebRTC UDP/TCP port — must match the Calls plugin config in Mattermost

  # ── WebRTC service — must be publicly reachable by browser/mobile clients ──
  # WebRTC media is UDP — HTTPRoute and Ingress are Layer 7 (HTTP only) and
  # cannot handle UDP. An NLB (Layer 4) is required.
  #
  # internet-facing NLB example (most common for Calls):
  #   service:
  #     type: LoadBalancer
  #     annotations:
  #       service.beta.kubernetes.io/aws-load-balancer-type: external
  #       service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  #       service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
  #       external-dns.alpha.kubernetes.io/hostname: rtcd.dev.cloud.mattermost.com
  #
  # Public subnets must be tagged: kubernetes.io/role/elb = 1
  service:
    type: ClusterIP   # override to LoadBalancer in cluster values when Calls is active
    annotations: {}

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Teleport Kubernetes Agent — SSH / Kubernetes access control via Teleport proxy
#
# Registers this cluster with the Teleport proxy at proxyAddr.
# roles: "kube" grants `tsh kube login` access; add "app,db" for app/db access.
# joinParams.method: token — the token must already exist in Teleport.
# ha: true → replicaCount forced to 2 + PodDisruptionBudget.
# ------------------------------------------------------------------------------
teleport:
  enabled: false
  namespace: teleport

  chart:
    name: teleport-kube-agent
    version: "18.4.0"
    repo:
      name: teleport
      type: default
      url: https://charts.releases.teleport.dev

  proxyAddr: "" # your Teleport proxy, e.g. "teleport.example.com:443"
  roles: kube # "kube" | "app" | "db" — comma-separate for multiple roles

  joinParams:
    method: token # "token" is simplest; "iam" also supported on AWS
    tokenName: "" # provision-time join token — create in Teleport UI first

  kubeClusterName: "" # shown in `tsh kube ls`; defaults to global.aws.clusterName

  ha: false # set true for production — forces replicaCount to 2 + PodDisruptionBudget
  replicaCount: 1 # ignored when ha: true (pinned to 2)

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Thanos — long-term metrics storage and multi-cluster query
#
# IMPORTANT: namespace MUST match prometheus.namespace above so the Thanos
# sidecar (running inside the Prometheus pod) is reachable via cluster-local DNS.
# No Namespace resource is created here.
#
# Architecture in a single-cluster setup:
#   Prometheus → (Thanos sidecar) → S3 bucket
#   Thanos StoreGateway reads S3 → Thanos Query aggregates → QueryFrontend caches
#
# For cross-cluster querying, expose the gRPC service as an NLB and add its
# address to the hub cluster's thanos.query.stores list.
# ------------------------------------------------------------------------------
thanos:
  enabled: false
  namespace: monitoring # must match prometheus.namespace

  chart:
    name: thanos
    version: "17.3.1"
    repo:
      name: bitnami
      type: oci
      url: oci://registry-1.docker.io/bitnamicharts

  # S3 object store — required for sidecar block uploads, storegateway reads, and compaction.
  # When bucket is set, thanos/secret.yaml creates the thanos-objstore-config Secret.
  # IRSA handles AWS auth — no credentials needed; set the IRSA role on Prometheus SA.
  objstore:
    bucket: "" # S3 bucket name — must exist before enabling thanos
    region: "" # defaults to global.aws.region when blank

  # Use the official upstream Thanos image from quay.io rather than the
  # Bitnami-bundled image. The Bitnami chart's default image tag has historically
  # been missing or delayed at chart release time; the upstream quay.io/thanos/thanos
  # image is versioned independently and is always available.
  # Override registry/repository/tag here to pin a specific build.
  image:
    registry: quay.io
    repository: thanos/thanos
    tag: v0.38.0

  query:
    replicaCount: 1
    stores: [] # add remote cluster gRPC store addresses for cross-cluster querying
    replicaLabels:
      - prometheus_replica

    # dnsDiscovery auto-discovers the Prometheus Thanos sidecar via a headless Service.
    # sidecarsService must match the thanosService name created by kube-prometheus-stack.
    # Run: kubectl get svc -n monitoring | grep thanos
    # to find the exact name after prometheus is deployed, then set it here.
    dnsDiscovery:
      enabled: false # enable when prometheus.thanos.enabled is true
      sidecarsService: "" # e.g. "prometheus-kube-prometheus-stack-thanos-discovery"
      sidecarsNamespace: "" # defaults to thanos.namespace (monitoring)

    # gRPC service for the Query component — use LoadBalancer to expose it for
    # cross-cluster querying (e.g. a hub cluster aggregating multiple spoke clusters)
    grpcService:
      type: ClusterIP
      annotations: {}
      # Cross-cluster (internal NLB) example:
      # type: LoadBalancer
      # annotations:
      #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
      #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
      #   service.beta.kubernetes.io/aws-load-balancer-scheme: internal

  # ── Routing ────────────────────────────────────────────────────────────────
  # Choose ONE of the two options below — do not enable both simultaneously.
  # Both expose the Thanos Query HTTP API (port 9090).
  #
  # httproute: use when the cluster has a Gateway API controller (Cilium)
  # ingress:   use for clusters with a traditional ingress controller, or
  #            with AWS ALB Ingress Controller (ingressClass: alb)
  #
  # ALB + Route53 via ingress annotations example:
  #   ingressClass: alb
  #   annotations:
  #     alb.ingress.kubernetes.io/scheme: internal
  #     alb.ingress.kubernetes.io/target-type: ip
  #     alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
  #     alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:..."
  #     external-dns.alpha.kubernetes.io/hostname: thanos.dev.cloud.mattermost.com
  httproute:
    enabled: false
    host: "" # e.g. thanos.dev.cloud.mattermost.com
    gatewayName: cilium-gateway
    gatewayNamespace: kube-system

  ingress:
    enabled: false
    host: "" # e.g. thanos.dev.cloud.mattermost.com
    ingressClass: nginx-controller # swap to "alb" for AWS ALB Ingress Controller
    annotations: {} # add external-dns, alb, or cert-manager annotations here
    tlsSecretName: "" # omit for ALB (TLS is terminated at the ALB, not in-cluster)

  queryFrontend:
    enabled: false # set true to cache query results and reduce load on Query
    replicaCount: 1

  compactor:
    enabled: false # compacts and downsamples S3 blocks; run exactly one instance

  storegateway:
    enabled: false # reads S3 blocks for long-term query
    replicaCount: 1
    persistence:
      size: 20Gi # larger = faster cold query startup (index cache)
      storageClass: "" # blank → cluster default StorageClass

  metrics:
    enabled: true # expose /metrics on all Thanos components
    serviceMonitor:
      enabled: false # set true when prometheus is deployed in the same cluster

  nodeSelector: {}
  tolerations: []

  # Pod anti-affinity spreads query replicas across nodes to avoid a single node
  # outage taking down all query capacity. nodeAffinity for cluster-specific node
  # roles (e.g. "addons") should be added in the env override's extraValues.
  extraValues:
    query:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 3Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - query
                topologyKey: kubernetes.io/hostname

# ------------------------------------------------------------------------------
# Velero — cluster backup and restore to S3
#
# Takes volume snapshots (EBS) and uploads manifests + PV data to S3.
# defaultVolumesToFsBackup: false uses native EBS snapshots (faster, cheaper).
# Set to true to use Restic/Kopia file-system backup for non-EBS volumes.
#
# Requires an IRSA role with:
#   ec2:CreateSnapshot, ec2:DescribeSnapshots, ec2:DeleteSnapshot
#   s3:GetObject, s3:PutObject, s3:DeleteObject on the target bucket
# ------------------------------------------------------------------------------
velero:
  enabled: false
  namespace: velero

  chart:
    name: velero
    version: "11.3.2"
    repo:
      name: vmware-tanzu
      type: default
      url: https://vmware-tanzu.github.io/helm-charts

  # arn:aws:iam::<accountNumber>:role/<clusterName>-<irsaRoleSuffix>
  irsaRoleSuffix: "velero"

  s3:
    bucket: "" # name of the S3 bucket — must exist; Velero does not create it
    region: us-east-2 # defaults to global.aws.region
    prefix: "" # optional key prefix inside the bucket

  plugin:
    image: velero/velero-plugin-for-aws
    tag: v1.8.0

  defaultVolumesToFsBackup: false # true = Restic/Kopia file-system backup for non-EBS volumes

  schedules: [] # define per-env; example:
  # schedules:
  #   - name: daily-backup
  #     cron: "0 3 * * *"    # 03:00 UTC every day
  #     ttl: 720h0m0s         # retain backups for 30 days

# ------------------------------------------------------------------------------
# Custom Addons — deploy arbitrary Helm charts without a dedicated template.
#
# Each entry renders a HelmRepository, ConfigMap, and HelmRelease.
# Use this for one-off Helm charts that don't need their own template.
#
# For non-Helm resources (raw manifests, Deployments, CronJobs, etc.) use
# extras/ in your cluster directory instead.
#
# REPO DEDUPLICATION
# If two addons share the same Helm repo, give them the same chart.repo.name.
# Only one HelmRepository is rendered per unique repo name.
#
# Fields:
#   namespace      — namespace to deploy into (required)
#   releaseName    — override the Helm release name (defaults to the addon key)
#   irsaRoleSuffix — injects eks.amazonaws.com/role-arn into serviceAccount.annotations
#   dependsOn      — list of {name, namespace} HelmReleases this must wait for
#   values         — arbitrary Helm chart values passed through as-is
#
# Example:
#
# wrapperCharts:
#   cert-manager:
#     enabled: true
#     namespace: cert-manager
#     chart:
#       name: cert-manager
#       version: "v1.14.0"
#       repo:
#         name: jetstack
#         type: default
#         url: https://charts.jetstack.io
#     values:
#       installCRDs: true
#       replicaCount: 1
#
#   my-internal-tool:
#     enabled: true
#     namespace: tools
#     releaseName: internal-tool
#     irsaRoleSuffix: internal-tool
#     dependsOn:
#       - name: cert-manager
#         namespace: cert-manager
#     chart:
#       name: internal-tool
#       version: "1.2.3"
#       repo:
#         name: my-private-repo
#         type: oci
#         url: oci://123456789.dkr.ecr.us-east-2.amazonaws.com/helm
#     values:
#       replicaCount: 2
#       image:
#         tag: "latest"
# ------------------------------------------------------------------------------
wrapperCharts: {}
