{{/*
  Loki Ingress — exposes the Loki gateway via a traditional ingress controller.

  Use this instead of httproute when the cluster uses nginx or ALB ingress
  rather than Cilium Gateway API. Same use case as httproute — only needed
  for cross-cluster Alloy push or cross-cluster Grafana queries.
*/}}
{{- if and .Values.loki.enabled ((.Values.loki.ingress).enabled) }}
{{- $app := .Values.loki }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki
  namespace: {{ $app.namespace }}
  {{- with $app.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $app.ingress.ingressClass | default "nginx-controller" }}
  rules:
    - host: {{ $app.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loki-gateway
                port:
                  number: 80
  {{- if $app.ingress.tlsSecretName }}
  tls:
    - secretName: {{ $app.ingress.tlsSecretName }}
      hosts:
        - {{ $app.ingress.host }}
  {{- end }}
{{- end }}
