{{- range $name, $app := (.Values.wrapperCharts | default dict) }}
{{- if $app.enabled }}
{{- $namespace   := $app.namespace   | default $name }}
{{- $releaseName := $app.releaseName | default $name }}

{{/* ── Namespace ────────────────────────────────────────────────────── */}}
{{- include "flux-addons.namespace" (dict "name" $namespace) }}

{{/* ── Values ConfigMap ─────────────────────────────────────────────── */}}
{{- include "flux-addons.configmap" (dict
    "name"      $name
    "namespace" $namespace
    "values"    ($app.values | default dict)) }}

{{/* ── IRSA service account annotation ────────────────────────────────
     Only injected when irsaRoleSuffix is set. Merged into values so the
     chart's serviceAccount.annotations picks it up automatically. */}}
{{- $chartValues := $app.values | default dict | deepCopy }}
{{- if $app.irsaRoleSuffix }}
{{-   $irsaArn := printf "arn:aws:iam::%s:role/%s-%s" $.Values.global.aws.accountNumber $.Values.global.aws.clusterName $app.irsaRoleSuffix }}
{{-   $_ := set $chartValues "serviceAccount" (dict "annotations" (dict "eks.amazonaws.com/role-arn" $irsaArn)) }}
{{- end }}

{{/* ── HelmRelease ──────────────────────────────────────────────────── */}}
{{- include "flux-addons.helmrelease" (dict
    "name"          $name
    "releaseName"   $releaseName
    "namespace"     $namespace
    "chart"         $app.chart
    "configmapName" $name
    "global"        $.Values.global
    "dependsOn"     ($app.dependsOn | default list)) }}

{{- end }}
{{- end }}
