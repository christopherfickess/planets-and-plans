{{- if and .Values.grafana.enabled ((.Values.grafana.httproute).enabled) }}
{{- $app := .Values.grafana }}
{{- $gatewayName      := $app.httproute.gatewayName      | default "cilium-gateway" }}
{{- $gatewayNamespace := $app.httproute.gatewayNamespace | default "kube-system" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: {{ $app.namespace }}
spec:
  hostnames:
    - {{ $app.httproute.host }}
  parentRefs:
    - name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          port: 80
{{- end }}
