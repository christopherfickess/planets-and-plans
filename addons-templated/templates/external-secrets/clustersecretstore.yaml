{{- /*
  Guard: only render when the CRD is present AND v1 is actually being served.
  external-secrets >= 0.10 GA'd the API to v1 — v1beta1 is still in the CRD
  schema for conversion purposes but served: false, so v1beta1 resources are
  rejected at apply time. This loop checks the version we actually use (v1).
*/}}
{{- $crd := lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "clustersecretstores.external-secrets.io" | default dict }}
{{- $v1Ready := false }}
{{- range (($crd.spec).versions | default list) }}
{{- if and .served (eq .name "v1") }}{{- $v1Ready = true }}{{- end }}
{{- end }}
{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.clusterSecretStore.enabled $v1Ready }}
{{- $app := .Values.externalSecrets }}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $app.clusterSecretStore.name | default "aws-secretsmanager" }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $app.clusterSecretStore.region | default "us-east-2" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ $app.clusterSecretStore.serviceAccountRef | default "external-secrets" }}
            namespace: {{ $app.namespace }}
{{- end }}
