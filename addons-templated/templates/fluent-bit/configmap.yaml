{{/*
  ── Fluent Bit config sections defined as named templates ──────────────
  Using define blocks keeps each section human-readable and diff-friendly.
  Each block is trimmed and assigned to a variable before being passed
  into the chart values dict.
*/}}

{{- define "fluent-bit.service" }}
[SERVICE]
    Flush                     5
    Daemon                    Off
    Log_Level                 info
    Parsers_File              parsers.conf
    Parsers_File              custom_parsers.conf
    HTTP_Server               On
    HTTP_Listen               0.0.0.0
    HTTP_Port                 2020
    storage.path              /var/log/flb-storage/
    storage.sync              normal
    storage.checksum          off
    storage.max_chunks_up     128
    storage.backlog.mem_limit 5M
{{- end }}

{{- define "fluent-bit.inputs" }}
[INPUT]
    Name             tail
    Path             /var/log/containers/*mattermost*.log
    Parser           containerd
    Tag              mattermost-audit.*
    Refresh_Interval 5
    Mem_Buf_Limit    32MB
    Skip_Long_Lines  On
    DB               /var/log/flb_audit.db
    db.sync          Normal
{{- end }}

{{- define "fluent-bit.filters" }}
[FILTER]
    Name           parser
    Match          mattermost-audit.*
    Key_Name       log
    Parser         containerd
    Preserve_Key   false
    Reserve_Data   false

[FILTER]
    Name           parser
    Match          mattermost-audit.*
    Key_Name       log
    Preserve_Key   true
    Reserve_Data   true
    Parser         json_no_time

[FILTER]
    Name                kubernetes
    Match               mattermost-audit.*
    Kube_Tag_Prefix     mattermost-audit.var.log.containers.
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Merge_Log           On
    K8S-Logging.Parser  On
    K8S-Logging.Exclude On
    Labels              On
    Annotations         Off

[FILTER]
    Name    grep
    Match   mattermost-audit.*
    Regex   level audit

[FILTER]
    Name    modify
    Match   mattermost-audit.*
    Add     customer {{ .customer }}
    Add     log_type audit
{{- end }}

{{- define "fluent-bit.outputs" }}
[OUTPUT]
    Name                         s3
    Match                        mattermost-audit.*
    bucket                       {{ .s3Bucket }}
    region                       {{ .s3Region }}
    total_file_size              {{ .fileSize }}
    upload_timeout               {{ .uploadTimeout }}
    use_put_object               On
    compression                  gzip
    content_type                 application/json
    s3_key_format                /{{ .s3Prefix }}/year=%Y/month=%m/day=%d/hour=%H/%H-%M-%S-$UUID.gz
    s3_key_format_tag_delimiters .-
    store_dir                    /var/log/flb-storage/s3
    store_dir_limit_size         2G
    retry_limit                  5
    json_date_key                timestamp
    json_date_format             iso8601

[OUTPUT]
    Name   stdout
    Match  mattermost-audit.*
    Format json_lines
{{- end }}

{{- define "fluent-bit.customParsers" }}
[PARSER]
    Name        containerd
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[A-Z]*) (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name   json_no_time
    Format json
{{- end }}

{{/* ─────────────────────────────────────────────────────────────────── */}}

{{- if .Values.fluentBit.enabled }}
{{- $app := .Values.fluentBit }}

{{- $s3Bucket      := $app.s3.bucket        | default "REPLACE_ME" }}
{{- $s3Region      := $app.s3.region        | default "us-east-2" }}
{{- $s3Prefix      := $app.s3.prefix        | default "audit-logs" }}
{{- $fileSize      := $app.s3.totalFileSize  | default "100M" }}
{{- $uploadTimeout := $app.s3.uploadTimeout  | default "10m" }}
{{- $customer      := $app.customer | default .Values.global.aws.clusterName }}
{{- $irsaRoleArn   := printf "arn:aws:iam::%s:role/%s-%s" .Values.global.aws.accountNumber .Values.global.aws.clusterName $app.irsaRoleSuffix }}

{{- $outputCtx := dict
    "s3Bucket"      $s3Bucket
    "s3Region"      $s3Region
    "s3Prefix"      $s3Prefix
    "fileSize"      $fileSize
    "uploadTimeout" $uploadTimeout }}

{{- $chartValues := dict
    "serviceAccount" (dict
        "create"      true
        "annotations" (dict "eks.amazonaws.com/role-arn" $irsaRoleArn))
    "tolerations"    ($app.tolerations | default list)
    "resources"      ($app.resources   | default dict)
    "podAnnotations" (dict "fluentbit.io/exclude" "true")
    "config" (dict
        "service"       (include "fluent-bit.service"       . | trim)
        "inputs"        (include "fluent-bit.inputs"        . | trim)
        "filters"       (include "fluent-bit.filters"       (dict "customer" $customer) | trim)
        "outputs"       (include "fluent-bit.outputs"       $outputCtx | trim)
        "customParsers" (include "fluent-bit.customParsers" . | trim))
}}

{{- $mergedValues := mergeOverwrite $chartValues ($app.extraValues | default dict) }}
{{- include "flux-addons.configmap" (dict "name" "fluent-bit" "namespace" $app.namespace "values" $mergedValues) }}
{{- end }}
