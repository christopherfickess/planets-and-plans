{{/* Pre-creates the admission webhook SA so the Helm hook Job can find it at install time.
     Without this the hook Job races against Helm creating the SA and may fail. */}}
{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-prometheus-stack-admission
  namespace: {{ .Values.prometheus.namespace }}
{{- end }}
