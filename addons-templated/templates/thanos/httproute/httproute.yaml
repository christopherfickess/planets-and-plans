{{- if and .Values.thanos.enabled ((.Values.thanos.httproute).enabled) }}
{{- $app              := .Values.thanos }}
{{- $gatewayName      := $app.httproute.gatewayName      | default "cilium-gateway" }}
{{- $gatewayNamespace := $app.httproute.gatewayNamespace | default "kube-system" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: thanos
  namespace: {{ $app.namespace }}
spec:
  hostnames:
    - {{ $app.httproute.host }}
  parentRefs:
    - name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: thanos-query
          port: 9090
{{- end }}
