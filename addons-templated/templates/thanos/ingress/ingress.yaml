{{- if and .Values.thanos.enabled ((.Values.thanos.ingress).enabled) }}
{{- $app := .Values.thanos }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thanos
  namespace: {{ $app.namespace }}
  {{- with $app.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $app.ingress.ingressClass | default "nginx-controller" }}
  rules:
    - host: {{ $app.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thanos-query
                port:
                  number: 9090
  {{- if $app.ingress.tlsSecretName }}
  tls:
    - secretName: {{ $app.ingress.tlsSecretName }}
      hosts:
        - {{ $app.ingress.host }}
  {{- end }}
{{- end }}
