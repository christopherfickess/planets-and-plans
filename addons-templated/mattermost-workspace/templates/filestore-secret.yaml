{{- $instance := .Values.instance }}
{{- $fileStoreMode := (($instance.fileStore).mode) | default "s3" }}
{{- if eq $fileStoreMode "s3" }}
---
# Empty credentials Secret for IRSA-based S3 access.
# The Mattermost operator requires a secret ref when external.url is set.
# With IRSA, the pod's service account provides credentials — accesskey/secretkey stay empty.
apiVersion: v1
kind: Secret
metadata:
  name: filestore
  namespace: {{ $instance.namespace }}
type: Opaque
stringData:
  accesskey: ""
  secretkey: ""
{{- end }}
