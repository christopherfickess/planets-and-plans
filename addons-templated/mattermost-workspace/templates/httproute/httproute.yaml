{{- $instance := .Values.instance }}
{{- if ($instance.httproute).enabled }}
{{- $gatewayName      := $instance.httproute.gatewayName      | default "cilium-gateway" }}
{{- $gatewayNamespace := $instance.httproute.gatewayNamespace | default "kube-system" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mattermost
  namespace: {{ $instance.namespace }}
spec:
  hostnames:
    - {{ $instance.host }}
  parentRefs:
    - name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mattermost
          port: 8065
{{- end }}
