{{- $instance := .Values.instance }}
{{- if ($instance.postgres).enabled }}
{{- $name       := .Values.instanceName }}
{{- $namespace  := $instance.namespace }}
{{- $secretName := printf "%s-database" $namespace }}
{{- $svcName    := printf "postgres-%s" $name }}
{{- $username   := $instance.postgres.username | default "mattermost" }}

{{/* ── Password ─────────────────────────────────────────────────────────
     randomPassword: true (default) — auto-generate on first install and
       preserve across upgrades via lookup on the existing Secret.
     randomPassword: false — use the explicit password from values. */}}
{{- $password := "" }}
{{- if or $instance.postgres.randomPassword (not (hasKey $instance.postgres "randomPassword")) }}
{{-   $existingSecret := lookup "v1" "Secret" $namespace $secretName }}
{{-   if and $existingSecret $existingSecret.data (index $existingSecret.data "POSTGRES_PASSWORD") }}
{{-     $password = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{-   else }}
{{-     $password = randAlphaNum 32 }}
{{-   end }}
{{- else }}
{{-   $password = $instance.postgres.password | default "" }}
{{- end }}

{{- $connStr := printf "postgres://%s:%s@%s.%s.svc.cluster.local:5432/mattermost?connect_timeout=10&sslmode=disable" $username ($password | urlquery) $svcName $namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
type: Opaque
stringData:
  POSTGRES_USER: {{ $username | quote }}
  POSTGRES_PASSWORD: {{ $password | quote }}
  POSTGRES_DB: "mattermost"
  DB_CONNECTION_STRING: {{ $connStr | quote }}
  DB_CONNECTION_CHECK_URL: {{ $connStr | quote }}
  MM_CONFIG: {{ $connStr | quote }}
{{- end }}
