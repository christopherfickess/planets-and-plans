apiVersion: v2
name: mattermost-workspace
description: |
  Per-instance Mattermost workspace.
  Renders the Mattermost CR, postgres, external-secrets, routing, and IRSA service account
  for a single Mattermost instance. One HelmRelease per instance is generated by the
  flux-addons chart so each instance can be reconciled independently.
type: application
version: 0.4.4
appVersion: "1.0.0"
