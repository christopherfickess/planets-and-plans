# ==============================================================================
# mattermost-workspace default values
#
# These are NOT set directly — the flux-addons chart generates one HelmRelease
# per instance and injects these values via a ConfigMap.  Do not edit this file
# to configure instances; edit the cluster values.yaml instead.
# ==============================================================================

global:
  aws:
    clusterName: ""
    region: ""
  helmReleaseInterval: "10m"

# Name key of this instance (e.g. "mattermost-internal")
instanceName: ""

# Full instance configuration — mirrors the structure under mattermost.instances.<name>
instance:
  namespace: ""
  version: ""
  replicas: 1
  host: ""
  fileStore:
    mode: s3 # s3 | operatorManaged | nfs | blobStorage (coming soon)
    s3:
      bucket: ""
    operatorManaged:
      storageSize: "50Gi"
      replicas: 1
    nfs:
      server: ""
      path: ""
      mountPath: "/mattermost/data"
      storageSize: "100Gi"

  postgres:
    enabled: false
    storage: "10Gi"
    storageClass: ""
    username: mattermost
    randomPassword: true
    password: ""

  license:
    enabled: false
    externalSecret:
      secretKey: ""
      property: ""

  db:
    externalSecret:
      secretKey: ""
      property: ""

  httproute:
    enabled: false
    gatewayName: cilium-gateway
    gatewayNamespace: kube-system

  ingress:
    enabled: false
    ingressClass: nginx
    tlsSecret: ""
    annotations: {}

  nodeSelector:
    workload: general

  # Additional env vars injected into the Mattermost pod.
  # MM_CONFIG is always added automatically from the database secret.
  # Use this for any MM_* setting not exposed as a first-class field, e.g.:
  #   - name: MM_EMAILSETTINGS_SMTPSERVER
  #     value: "email-smtp.us-east-1.amazonaws.com"
  #   - name: MM_SERVICESETTINGS_ENABLEAPIPOSTDELETION
  #     value: "true"
  #   - name: MM_LICENSE
  #     valueFrom:
  #       secretKeyRef:
  #         name: mattermost-license
  #         key: license
  #         optional: true

  mattermostEnv: []

  reconcileInterval: "" # defaults to global.helmReleaseInterval

externalSecrets:
  enabled: false
