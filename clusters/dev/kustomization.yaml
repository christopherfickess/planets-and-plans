apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Bootstrap entry point — one-time manual apply ─────────────────────────────
# Run once from examples/basic/: kubectl apply -k clusters/dev/
#
# After bootstrap, Flux owns addon config. Day-to-day changes:
#   - Addon config  → edit addons/values.yaml and push (Flux auto-reconciles)
#   - Flux objects  → edit flux/ files, then re-run: kubectl apply -k clusters/dev/
#                     (flux/ is not self-reconciled — no Kustomization watches it)
#
# flux/   — Flux object definitions: GitRepositories, Kustomizations
# addons/ — HelmRelease + values.yaml (watched by the kubernetes-base-addons Kustomization)
#           flux-addons-values-dev ConfigMap is generated from addons/values.yaml by Flux,
#           not by this bootstrap file — changes take effect on git push automatically.
# ─────────────────────────────────────────────────────────────────────────────

resources:
  # ── Flux object definitions ───────────────────────────────────────────────
  - flux/gitrepositories.yaml
  - flux/cluster-crds.yaml
  - flux/kubernetes-base-addons.yaml

  # ── Addon HelmRelease + values ConfigMap (also managed by Flux after bootstrap) ──
  # Including addons/ here ensures flux-addons-values-dev exists before the
  # HelmRelease tries to read it on first bootstrap. Flux takes over after this.
  - addons/
  # ── Plain Kubernetes resources ────────────────────────────────────────────
  # Uncomment once ESO is running and the external-secrets namespace exists.
  # - addons/external-secrets-examples/test-externalsecret.yaml

  # -----------------------------------------------------------
  # How to patch existing Kubernetes resources
  # -----------------------------------------------------------
  # To patch existing Kubernetes resources, create a file in the addons/patches/ directory.
  # The file should be named <resource-name>.yaml.
  # The file should contain the patch to apply to the resource.
  # The patch should be a YAML object.
  # The patch should be applied to the resource in the addons/patches/ directory.
  # The patch should be applied to the resource in the addons/patches/ directory.
  # -------------------------------------------------------------------------------
  # patchesStrategicMerge:
  #   - addons/patches/<app-name>-<resource-name>.yaml
