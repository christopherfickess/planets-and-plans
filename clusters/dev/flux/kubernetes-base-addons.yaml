# ==============================================================================
# WHY THIS IS A KUSTOMIZATION (not a bare HelmRelease)
# ---------------------------------------------------------------
# HelmRelease.spec.dependsOn can only reference other HelmReleases.
# cluster-crds is a Kustomization, so a HelmRelease cannot depend on it directly.
#
# Solution: wrap the HelmRelease in a Kustomization that CAN depend on cluster-crds.
#
# SOURCE: reads from the terraform-aws-eks GitRepo (same repo as the cluster config),
# not the kubernetes-base-addons GitRepo. The name refers to what it deploys.
#
# PATH: clusters/dev/addons/ — contains helmrelease.yaml and values.yaml.
# The configMapGenerator in addons/kustomization.yaml generates flux-addons-values-dev
# from values.yaml on every reconcile, so git push is all that's needed to
# update addon configuration — no manual kubectl apply required.
# ==============================================================================
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubernetes-base-addons
  namespace: flux-system
spec:
  interval: 1m
  dependsOn:
    - name: cluster-crds
  sourceRef:
    kind: GitRepository
    name: terraform-aws-eks
  path: ./examples/basic/clusters/dev/addons
  prune: true
  wait: true  # wait for HelmRelease to reach Ready before dependent resources start
