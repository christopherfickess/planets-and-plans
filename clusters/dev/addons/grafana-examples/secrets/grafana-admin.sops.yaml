# ==============================================================================
# Grafana admin password secret
#
# This file must be encrypted with SOPS before committing:
#   sops --encrypt grafana-admin.sops.yaml > grafana-admin.sops.yaml
#
# To edit after encryption:
#   sops grafana-admin.sops.yaml
#
# See docs/sops-integration.md for full setup instructions.
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: monitoring    # must match grafana.namespace in values.yaml
stringData:
  admin-password: REPLACE_ME   # encrypt this file — never commit plaintext
