# ==============================================================================
# Example: Grafana service account with IRSA annotation
#
# Use this if you need to override the service account created by the Helm chart,
# e.g. to add an IRSA role annotation for S3 access.
#
# If the Helm chart's serviceAccount.annotations value is sufficient, you do NOT
# need this file — set the annotation in values.yaml instead:
#
#   grafana:
#     serviceAccount:
#       annotations:
#         eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<cluster>-grafana
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: monitoring    # must match grafana.namespace in values.yaml
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CLUSTER_NAME-grafana
