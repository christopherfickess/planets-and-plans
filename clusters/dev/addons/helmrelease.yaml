# ==============================================================================
# HelmRelease — deploys the kubernetes-base-addons umbrella chart
#
# Chart source: addons-templated/ in the kubernetes-base-addons GitRepository.
# Values: base addons-templated/values.yaml merged with the dev ConfigMap
# generated by the configMapGenerator in clusters/dev/addons/kustomization.yaml.
#
# Applied by the kubernetes-base-addons Kustomization (flux/kubernetes-base-addons.yaml),
# which gates this on cluster-crds being Ready first.
# ==============================================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-base-addons
  namespace: flux-system
spec:
  interval: 1m
  # No dependsOn needed here — the kubernetes-base-addons Kustomization
  # (flux/kubernetes-base-addons.yaml) already depends on cluster-crds.
  chart:
    spec:
      chart: ./addons-templated
      sourceRef:
        kind: GitRepository
        name: kubernetes-base-addons
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: flux-addons-values-dev
      valuesKey: values.yaml
