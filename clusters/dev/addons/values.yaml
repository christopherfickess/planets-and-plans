# ==============================================================================
# Dev Cluster — Addon Override Values
#
# HOW THIS WORKS
# --------------
# Helm merges the base addons/values.yaml first, then this file on top.
# Only values listed here override the base. Everything else inherits.
#
# THIS FILE IS A TEMPLATE
# -----------------------
# All addons are explicitly listed — enabled AND disabled — with their full
# configuration filled in. When bootstrapping a new cluster, copy this file,
# update the global section, and adjust per-addon settings as needed.
# This makes diffs across environments easy to review.
#
# CHART VERSIONS
# --------------
# Pinned here so each env can be on a different version.
# Promote upgrades: bump dev → verify → bump staging → bump prod.
# When you bump a chart version, also update crds/<app>/ if the chart ships
# CRDs (prometheus-stack, mattermost-operator, velero, alb).
#
# PASSING ARBITRARY CHART VALUES
# --------------------------------
# Any field the chart exposes but this wrapper doesn't can be passed via
# extraValues — it is merged last and overrides everything:
#
#   someApp:
#     extraValues:
#       podAnnotations:
#         cert-manager.io/cluster-issuer: "letsencrypt-prod"
#       service:
#         annotations:
#           service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:..."
# ==============================================================================

global:
  helmReleaseInterval: 1m # faster reconcile in dev — set 10m in staging/prod
  helmRepoInterval: 1m # how often Flux polls Helm repos; set 10m in staging/prod
  chartInterval: 1m # how often Flux re-checks chart versions
  upgradeTimeout: 15m # 1m was too short for multi-component charts (loki, prometheus)
  upgradeRetries: 5 # retries before marking HelmRelease as failed

  aws:
    clusterName: "platform-test"
    region: "us-east-2"

  dns:
    # kubectl get svc kube-dns -n kube-system -o jsonpath='{.spec.clusterIP}'
    clusterDNS: "10.100.0.10"

# ------------------------------------------------------------------------------
# Alloy — log collection and forwarding to Loki
#
# Disabled: requires a running Loki endpoint. Enable when Loki is deployed.
# All config below is fully wired — flip enabled: true and set loki.endpoint.
#
# NOTE: mattermost-update-check log processing is not auto-generated by the
# template. If needed, mirror the mattermost stage.match block via extraAlloyConfig
# or add it to the alloy.riverConfig define block in the chart templates.
# ------------------------------------------------------------------------------
alloy:
  enabled: true
  chart:
    version: "1.7.0"

  # clusterName defaults to global.aws.clusterName — explicit here per template convention
  clusterName: "platform-test"
  customer: "mattermost" # stamped on every log stream for multi-tenant Loki queries
  environment: "dev"

  loki:
    # Loki is deployed in this cluster (monitoring namespace) — use internal DNS.
    # No HTTPRoute or Ingress needed for Alloy to push; this is a cluster-local call.
    endpoint: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
    tenantID: "platform-test"

  # tolerations inherit from base (runs on all tainted nodes — master, control-plane, utilities, monitoring, calls)

  updateStrategy:
    type: RollingUpdate
    maxUnavailable: 1
  # resources inherit from base values (50m/200Mi requests, 500m/2000Mi limits)

  # Expose the Alloy UI via the Cilium Gateway — useful for debugging River config.
  # Disable both if cluster-internal access via port-forward is sufficient.
  httproute:
    enabled: true # flip to true to expose alloy.dev.cloud.mattermost.com
    host: chris-alloy.dev.cloud.mattermost.com

  ingress:
    enabled: false # alternative to httproute — enable if using ALB Ingress Controller
    host: alloy.dev.cloud.mattermost.com
    ingressClass: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: "[{\"HTTPS\":443}]"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-2:926412419614:\
        certificate/e91b2cf5-6075-49ff-b7b7-fb5adf06541f"
      external-dns.alpha.kubernetes.io/hostname: alloy.dev.cloud.mattermost.com

# ------------------------------------------------------------------------------
# AWS Load Balancer Controller — provisions ALBs from Kubernetes Ingress resources
#
# Enabled: required for ciliumGateway to provision the external ALB.
# hostNetwork: true puts the LBC pod on the node's VPC IP so the EKS control plane
# can reach the webhook server directly (same pattern as byoc). Without this,
# the control plane cannot reach Cilium overlay IPs ("Address is not allowed").
# v3 CRDs required: kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller/crds?ref=master"
# ------------------------------------------------------------------------------
awsLoadBalancerController:
  enabled: true
  chart:
    version: "3.2.1"

  clusterName: "platform-test"

  # Explicit VPC ID — required because the controller cannot reach EC2 instance
  # metadata (IMDS) from within the pod to auto-detect it.
  vpcID: "vpc-09264fb1819da54f2"

  ha: false # single replica is fine in dev
  replicaCount: 1

  nodeSelector: {}
  tolerations: []

  extraValues:
    # hostNetwork puts the pod on the node's VPC IP — required so the EKS control
    # plane can reach the LBC webhook server in this Cilium CNI setup.
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-aws-l\
          oad-balancer-controller"
    controllerConfig:
      featureGates:
        # Cilium handles all Gateway API traffic in this cluster — LBC does not need
        # to watch Gateway API types. Disabling prevents LBC from crashing with
        # "failed to sync ListenerSet cache" when Gateway API experimental CRDs
        # (gateway.networking.k8s.io/ListenerSet) are not installed.
        NLBGatewayAPI: "false"
        ALBGatewayAPI: "false"

# ------------------------------------------------------------------------------
# Cilium Gateway — ALB → Cilium Gateway API bridge
#
# Enabled: provides the single ingress point for all HTTP routes in the cluster.
# All hosted services (grafana, mattermost, etc.) attach HTTPRoutes to this gateway.
# ------------------------------------------------------------------------------
ciliumGateway:
  enabled: true

  alb:
    hostname: "*.dev.cloud.mattermost.com"
    certArn: "arn:aws:acm:us-east-2:926412419614:certificate/e91b2cf5-6075-49ff-b7b\
      7-fb5adf06541f"
    wafArn: "arn:aws:wafv2:us-east-2:926412419614:regional/webacl/byoc-staging-inte\
      rnal-staging-waf/078a64a3-e2a0-4953-8c7d-fa8fb7969fa5"
    subnets: "subnet-0c20137b1b99651f8, subnet-0f90ef14a6b23a545,
      subnet-0bf9709c4f8e7ac6e"
    extraTags: ",Environment=dev,Customer=mattermost"

# ------------------------------------------------------------------------------
# Cluster Autoscaler — scales EKS managed node groups on pod pressure
#
# Enabled: required to handle burst load without manual intervention.
# Node groups must be tagged:
#   k8s.io/cluster-autoscaler/enabled = "true"
#   k8s.io/cluster-autoscaler/platform-test = "owned"
# ------------------------------------------------------------------------------
clusterAutoscaler:
  enabled: true
  chart:
    version: "9.54.0"

  clusterName: "platform-test"

  nodeSelector: {}
  tolerations: []

  extraValues:
    rbac:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-cluster-autoscaler"

# ------------------------------------------------------------------------------
# External Secrets Operator — syncs K8s Secrets from AWS Secrets Manager
#
# Disabled: using manually managed secrets in this dev cluster.
# Enable here and set secretKey fields on individual addons when Secrets Manager
# integration is needed (e.g. production).
# ------------------------------------------------------------------------------
externalSecrets:
  enabled: true
  chart:
    version: "0.17.0"

  clusterSecretStore:
    enabled: true
    name: aws-secretsmanager
    region: "us-east-2"

  extraValues:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-external-secrets"

# ------------------------------------------------------------------------------
# Fluent Bit — ships Mattermost audit logs to S3
#
# Enabled: audit log capture is required in all environments.
# The extraValues block configures the S3 output for audit logs; the stdout
# output is for in-cluster debugging and can be removed in prod.
# ------------------------------------------------------------------------------
fluentBit:
  enabled: true
  chart:
    version: "0.48.9"

  customer: "dev" # label added to every log record for multi-tenant identification

  s3:
    bucket: "platform-test-audit-logs-926412419614"

  extraValues:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-fluent-bit"
    config:
      outputs: |
        [OUTPUT]
            Name                         s3
            Match                        mattermost-audit.*
            bucket                       platform-test-audit-logs-926412419614
            region                       us-east-2
            total_file_size              250M
            upload_timeout               24h
            use_put_object               On
            compression                  gzip
            content_type                 application/json
            s3_key_format                /audit-logs/year=%Y/month=%m/day=%d/hour=%H/%H-%M-%S-$UUID.gz
            s3_key_format_tag_delimiters .-
            store_dir                    /var/log/flb-storage/s3
            store_dir_limit_size         2G
            retry_limit                  5
            json_date_key                timestamp
            json_date_format             iso8601
        [OUTPUT]
            Name   stdout
            Match  mattermost-audit.*
            Format json_lines

# ------------------------------------------------------------------------------
# Grafana — standalone dashboards aggregating metrics from this cluster
#
# Enabled: in-cluster Postgres for Grafana state (dashboards, users, alerts).
# storageClass.enabled: true creates the grafana-gp3 EBS StorageClass used by
# the Postgres StatefulSet PVC. Without this the PVC stays Pending.
#
# persistence.enabled: false — the template auto-suppresses the SQLite PVC
# when postgres.internal is enabled. Keeping it explicit here avoids confusion.
# ------------------------------------------------------------------------------
grafana:
  enabled: true
  chart:
    version: "10.5.15"

  storageClass:
    enabled: true # creates grafana-gp3 StorageClass; required for postgres PVC

  persistence:
    enabled: false # suppressed by template when postgres.internal.enabled is true

  replicas: 1

  datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus # kube-prometheus-stack dashboards hardcode this UID in their variable definitions
      url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      isDefault: true
    - name: Thanos
      type: prometheus
      uid: thanos
      url: http://thanos-query-frontend.monitoring.svc.cluster.local:9090

  postgres:
    # In-cluster Postgres — use in dev and any env without RDS.
    # Switch to external below for staging/prod RDS deployments.
    internal:
      enabled: true
      storage: 100Gi # increase to 500Gi–1Ti for prod depending on dashboard volume
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 1Gi

    # RDS / Aurora external Postgres — disabled in dev.
    # Enable and fill host/database/username for staging/prod.
    external:
      enabled: false
      # host: "grafana.abc123.us-east-2.rds.amazonaws.com"
      # port: 5432
      # database: grafana
      # username: grafana
      # existingSecret:
      #   name: grafana-database
      #   key: POSTGRES_PASSWORD

      # Admin credentials — grafana-auth.yaml auto-generates grafana-admin-secret on first install.
      # Switch to adminExternalSecret when externalSecrets is enabled above.
  adminPasswordSecretRef:
    name: grafana-admin-secret
    key: admin-password

  httproute:
    enabled: true
    host: chris-grafana.dev.cloud.mattermost.com

  nodeSelector: {}
  tolerations: []

  extraValues: {}

# ------------------------------------------------------------------------------
# Loki — in-cluster log aggregation
#
# Receives log streams from Alloy (running as a DaemonSet in this cluster),
# stores them in S3, and exposes a LogQL query API for Grafana.
#
# authEnabled: true — multi-tenant; Alloy stamps every stream with
#   X-Scope-OrgID: platform-test (alloy.loki.tenantID above). Grafana
#   datasource must set the same tenantID header to query correctly.
#
# The HTTPRoute exposes the Loki gateway externally — useful for accessing
# the Grafana Loki datasource from outside the cluster or for future
# cross-cluster Alloy agents pushing to this instance.
#
# IRSA role (platform-test-loki) must have:
#   s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket on platform-test-loki-926412419614
# ------------------------------------------------------------------------------
loki:
  enabled: true
  chart:
    version: "6.12.0"

  authEnabled: true # multi-tenant — matches alloy.loki.tenantID: "platform-test"

  deploymentMode: SingleBinary # single replica, all components in one pod — appropriate for dev
  replicas: 1
  replicationFactor: 1

  s3:
    bucket: "platform-test-loki-926412419614"
    # region defaults to global.aws.region (us-east-2)

    # Creates the loki-gp3 EBS StorageClass — required on this cluster since gp2
    # is the EKS default class and gp3 is preferred for Loki WAL workloads.
  storageClass:
    enabled: true
    name: loki-gp3

  persistence:
    size: 10Gi
    storageClass: loki-gp3 # matches storageClass.name above

  retention:
    enabled: true
    period: "744h" # 31 days — compactor runs automatically in SingleBinary mode

  # Expose via Cilium Gateway so the Grafana Loki datasource can be configured
  # from outside the cluster, and for future cross-cluster log aggregation.
  httproute:
    enabled: true
    host: chris-loki-gateway.dev.cloud.mattermost.com

  ingress:
    enabled: false
    host: loki.dev.cloud.mattermost.com
    ingressClass: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: "[{\"HTTPS\":443}]"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-2:926412419614:\
        certificate/e91b2cf5-6075-49ff-b7b7-fb5adf06541f"
      external-dns.alpha.kubernetes.io/hostname: loki.dev.cloud.mattermost.com

  nodeSelector: {}
  tolerations: []

  # Single-replica dev override — bypass memberlist ring discovery entirely.
  # With 1 replica there is no cross-node ring coordination; inmemory kvstore
  # handles all ring state in-process. This eliminates the loki-memberlist
  # headless Service dependency so a deleted or missing Service can't break boot.
  # Do NOT carry this to staging/prod — multi-replica deployments need memberlist.
  #
  # Only ingester and distributor expose a top-level `ring` field in Loki 3.1.x.
  # compactor.Config and scheduler.Config have no `ring` field — setting those
  # causes a config parse failure ("field ring not found in type X").
  extraValues:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-loki"
    loki:
      memberlistConfig:
        join_members: [] # empty = form a single-node cluster with itself; no DNS lookup
      ingester:
        lifecycler:
          ring:
            kvstore:
              store: inmemory
            replication_factor: 1
      distributor:
        ring:
          kvstore:
            store: inmemory

# ------------------------------------------------------------------------------
# Mattermost Operator — manages MattermostCluster CRDs
#
# Enabled: required before any mattermost.instances can be deployed.
# The image.tag override below pins the operator binary independently of the
# chart version — useful when the chart ships an older operator image.
# ------------------------------------------------------------------------------
mattermostOperator:
  enabled: true
  chart:
    version: "1.0.4"

  extraValues:
    mattermostOperator:
      image:
        tag: "v1.25.5"

# ------------------------------------------------------------------------------
# Mattermost instances — one per logical workspace
#
# Each entry under instances: produces a full set of resources:
#   Namespace, ServiceAccount (IRSA), Mattermost CR, HTTPRoute, Postgres StatefulSet.
#
# postgres.enabled: true → in-cluster Postgres StatefulSet.
# randomPassword: true  → password is auto-generated on first install and
#                         preserved across upgrades via lookup().
# ------------------------------------------------------------------------------
mattermost:
  instances:
    mattermost-internal:
      # RTCD — Mattermost Calls plugin media backend, deployed in the same namespace.
      # Flip enabled to true and switch service.type to LoadBalancer when Calls is active.
      # Public subnets must be tagged kubernetes.io/role/elb=1 for an internet-facing NLB.
      rtcd:
        enabled: true # flip to true when Calls plugin is active
        chartVersion: "1.4.1"
        rtcPort: 8443
        service:
          type: ClusterIP # switch to LoadBalancer when Calls is active

      namespace: mattermost-internal
      version: "11.5.1"
      replicas: 1
      host: "dev-chris.dev.cloud.mattermost.com"

      # Pin to x86_64 nodes — the mattermost-enterprise-edition image has no ARM64 variant.
      nodeSelector:
        arch: amd64

      fileStore:
        mode: s3
        s3:
          bucket: "platform-test-mattermost-internal-926412419614"

      postgres:
        enabled: true
        storage: 10Gi
        storageClass: "gp2" # gp2 is the EKS default; switch to gp3 when migrating to the new class
        username: mattermost
        randomPassword: true

      httproute:
        enabled: true

      mattermostEnv:
        - name: MM_FILESETTINGS_AMAZONS3SSE
          value: "true"
        - name: MM_FILESETTINGS_AMAZONS3SSL
          value: "true"

        # License — expects a pre-existing Secret named mattermost-license with key "license".
        # Mark optional: true so the pod starts without it (useful for dev spin-up).
        - name: MM_LICENSE
          valueFrom:
            secretKeyRef:
              key: license
              name: mattermost-license
              optional: true

        # Database connection string — generated by the in-cluster Postgres template.
        - name: MM_CONFIG
          valueFrom:
            secretKeyRef:
              key: MM_CONFIG
              name: mattermost-internal-database

        # Email delivery via SES SMTP in us-east-2.
        - name: MM_EMAILSETTINGS_SMTPPORT
          value: "587"
        - name: MM_EMAILSETTINGS_SMTPSERVER
          value: email-smtp.us-east-2.amazonaws.com
        - name: MM_EMAILSETTINGS_CONNECTIONSECURITY
          value: STARTTLS
        - name: MM_EMAILSETTINGS_ENABLESMTPAUTH
          value: "true"
        - name: MM_EMAILSETTINGS_SMTPUSERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: SMTP_USERNAME
              optional: true
        - name: MM_EMAILSETTINGS_SMTPPASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: SMTP_PASSWORD
              optional: true
        - name: MM_EMAILSETTINGS_FEEDBACKEMAIL
          value: "no-reply@palantir.mattermost.net"
        - name: MM_EMAILSETTINGS_FEEDBACKNAME
          value: Mattermost Notification
        - name: MM_EMAILSETTINGS_REPLYTOADDRESS
          value: "no-reply@palantir.mattermost.net"
        - name: MM_SUPPORTSETTINGS_SUPPORTEMAIL
          value: support@mattermost.com

        # Structured JSON logging — required for Fluent Bit audit log capture.
        - name: MM_LOGSETTINGS_CONSOLEJSON
          value: "true"
        - name: MM_LOGSETTINGS_CONSOLELEVEL
          value: "INFO"
        - name: MM_LOGSETTINGS_FILELEVEL
          value: "INFO"
        - name: MM_NOTIFICATIONLOGSETTINGS_CONSOLELEVEL
          value: "INFO"
        - name: MM_NOTIFICATIONLOGSETTINGS_FILELEVEL
          value: "INFO"

        # Advanced logging — writes structured JSON to stdout; Fluent Bit picks it up.
        - name: MM_LOGSETTINGS_ADVANCEDLOGGINGJSON
          value: "{\"stdout\":{\"Type\":\"console\",\"Format\":\"json\",\"Levels\":[{\"ID\
            \":4,\"Name\":\"info\",\"Stacktrace\":false},{\"ID\":3,\"Name\":\"w\
            arn\",\"Stacktrace\":false},{\"ID\":2,\"Name\":\"error\",\"Stacktra\
            ce\":true},{\"ID\":1,\"Name\":\"fatal\",\"Stacktrace\":true},{\"ID\
            \":0,\"Name\":\"panic\",\"Stacktrace\":true}],\"Options\":{\"Out\":\
            \"stdout\"},\"MaxQueueSize\":1000}}"

        # Audit logging — produces audit-api/content/permissions events for compliance.
        # Fluent Bit matches on mattermost-audit.* and ships to S3.
        - name: MM_EXPERIMENTALAUDITSETTINGS_ADVANCEDLOGGINGJSON
          value: "{\"audit-stdout\":{\"type\":\"console\",\"options\":{\"out\":\"stdout\"\
            },\"format\":\"json\",\"format_options\":{},\"levels\":[{\"id\":100,\
            \"name\":\"audit-api\"},{\"id\":101,\"name\":\"audit-content\"},{\"\
            id\":102,\"name\":\"audit-permissions\"},{\"id\":103,\"name\":\"aud\
            it-cli\"}],\"maxqueuesize\":1000}}"

        # OpenSearch / Elasticsearch — uncomment to enable full-text search backend.
        # Requires an OpenSearch cluster and credentials stored in an "opensearch" Secret.
        # - name: MM_ELASTICSEARCHSETTINGS_BACKEND
        #   value: "opensearch"
        # - name: MM_ELASTICSEARCHSETTINGS_SNIFF
        #   value: "false"
        # - name: MM_ELASTICSEARCHSETTINGS_ENABLEINDEXING
        #   value: "true"
        # - name: MM_ELASTICSEARCHSETTINGS_ENABLESEARCHING
        #   value: "true"
        # - name: MM_ELASTICSEARCHSETTINGS_ENABLEAUTOCOMPLETE
        #   value: "true"
        # - name: MM_ELASTICSEARCHSETTINGS_CONNECTIONURL
        #   valueFrom:
        #     secretKeyRef:
        #       key: OPENSEARCH_HOST
        #       name: opensearch
        #       optional: true
        # - name: MM_ELASTICSEARCHSETTINGS_USERNAME
        #   valueFrom:
        #     secretKeyRef:
        #       key: OPENSEARCH_USERNAME
        #       name: opensearch
        #       optional: true
        # - name: MM_ELASTICSEARCHSETTINGS_PASSWORD
        #   valueFrom:
        #     secretKeyRef:
        #       key: OPENSEARCH_PASSWORD
        #       name: opensearch
        #       optional: true

        # Shared Channels / Connected Workspaces — enables cross-cluster federation.
        - name: MM_SERVICESETTINGS_ENABLEAPIPOSTDELETION
          value: "true"
        - name: MM_CONNECTEDWORKSPACESSETTINGS_ENABLEREMOTECLUSTERSERVICE
          value: "true"
        - name: MM_CONNECTEDWORKSPACESSETTINGS_ENABLESHAREDCHANNELS
          value: "true"
        - name: MM_FEATUREFLAGS_ENABLESHAREDCHANNELSMEMBERSYNC
          value: "true"

# ------------------------------------------------------------------------------
# Metrics Server — enables kubectl top and Horizontal Pod Autoscaler
#
# Disabled: EKS provides native metrics via CloudWatch; kubectl top not needed
# in this cluster. Enable if HPA or VPA is required.
# ------------------------------------------------------------------------------
metricsServer:
  enabled: true
  chart:
    version: "3.12.1"

  extraValues:
    # hostNetwork moves the pod onto the node's IP rather than a Cilium pod IP.
    # The EKS control plane cannot reach Cilium pod IPs, so without this the
    # metrics-server APIService stays Unavailable (same "Address is not allowed"
    # error as the LBC webhooks). A broken APIService poisons Kubernetes API
    # discovery for all clients — including the Cilium operator, which then
    # never initializes its Gateway API controller.
    # containerPort 4443 avoids conflicting with kubelet which owns 10250 on
    # the host network.
    hostNetwork:
      enabled: true
    containerPort: 4443

# ------------------------------------------------------------------------------
# Prometheus (kube-prometheus-stack) — cluster-wide metrics collection
#
# Enabled: scrapes all node/pod/workload metrics and exposes them for Grafana.
# thanos.enabled: false — Thanos is not deployed yet; enable when the
# thanos-objstore-config Secret is present in the monitoring namespace.
# ------------------------------------------------------------------------------
prometheus:
  enabled: true
  chart:
    version: "83.6.0"

  storageSize: "50Gi" # increase to 200Gi+ for high-cardinality prod clusters

  nodeSelector: {}
  tolerations: []
  additionalServiceMonitors: []

  thanos:
    enabled: false # enable when thanos-objstore-config Secret exists in monitoring ns

  httproute:
    enabled: true
    host: chris-prometheus.dev.cloud.mattermost.com

  ingress:
    enabled: false
    host: prometheus.dev.cloud.mattermost.com
    ingressClass: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: "[{\"HTTPS\":443}]"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-2:926412419614:\
        certificate/e91b2cf5-6075-49ff-b7b7-fb5adf06541f"
      external-dns.alpha.kubernetes.io/hostname: prometheus.dev.cloud.mattermost.com

  extraValues:
    # Generate kube-prometheus-stack's built-in dashboard ConfigMaps even though
    # its bundled Grafana is disabled. Standalone Grafana's sidecar picks these up
    # via the grafana_dashboard: "1" label.
    grafana:
      enabled: false
      forceDeployDashboards: true
    prometheus:
      prometheusSpec:
        externalUrl: "https://chris-prometheus.dev.cloud.mattermost.com"
        # Dev sizing — chart default is 6Gi request which exceeds available headroom
        # on these t3.large/m5.large nodes once other addons are running.
        # Bump to 4Gi+ for staging/prod where dedicated monitoring nodes exist.
        resources:
          requests:
            cpu: 200m
            memory: 2Gi
          limits:
            cpu: 2
            memory: 6Gi

# ------------------------------------------------------------------------------
# Teleport Kubernetes Agent — SSH / Kubernetes access via Teleport proxy
#
# Disabled: this cluster is not registered with Teleport.
# Enable and fill in proxyAddr + joinParams when Teleport is required.
# ------------------------------------------------------------------------------
teleport:
  enabled: false # requires a running Teleport proxy — set proxyAddr + tokenName first
  chart:
    version: "18.4.0"

  # Create the join token in the Teleport UI (Infrastructure → Kubernetes → Enroll)
  # then fill in the values below and flip enabled: true.
  proxyAddr: "" # e.g. "teleport.example.com:443" or "your-org.teleport.sh:443"
  kubeClusterName: "platform-test"

  joinParams:
    method: token
    tokenName: "" # join token created in Teleport UI

  nodeSelector: {}
  tolerations: []

# ------------------------------------------------------------------------------
# Thanos — long-term metrics storage and query
#
# Disabled: not deployed yet. Enable together with prometheus.thanos.enabled
# once the thanos-objstore-config Secret is present.
#
# IRSA for each component is passed via extraValues because the wrapper chart
# does not expose per-component serviceAccount.annotations directly.
# ------------------------------------------------------------------------------
thanos:
  enabled: true # flip to true once objstore.bucket is confirmed and the S3 bucket exists
  chart:
    version: "17.3.1"

  objstore:
    bucket: "platform-test-thanos-926412419614" # set to the S3 bucket name for Thanos block storage before enabling
    # region defaults to global.aws.region (us-east-2)

  query:
    dnsDiscovery:
      enabled: true
      # sidecarsService is the headless Service created by kube-prometheus-stack for
      # the Thanos sidecar gRPC endpoint. Run after prometheus deploys:
      #   kubectl get svc -n monitoring | grep thanos
      # then set the exact name here (usually <release>-thanos-discovery).
      sidecarsService: ""
      # sidecarsNamespace defaults to thanos.namespace (monitoring) — matches prometheus

      # gRPC service — ClusterIP for now; switch to LoadBalancer when cross-cluster
      # querying is needed. Using LoadBalancer here blocks the Helm release until
      # the NLB is provisioned (~2-5 min), and will fail entirely if the private
      # subnets are missing the kubernetes.io/role/internal-elb: "1" tag.
      #
      # To enable cross-cluster NLB later, replace with:
      #   grpcService:
      #     type: LoadBalancer
      #     annotations:
      #       service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
      #       service.beta.kubernetes.io/aws-load-balancer-internal: "true"
      #       service.beta.kubernetes.io/aws-load-balancer-type: nlb
      #       external-dns.alpha.kubernetes.io/hostname: platform-test-grpc.thanos.dev.cloud.mattermost.com
    grpcService:
      type: ClusterIP

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true # prometheus is deployed in this cluster

  # Expose the Thanos Query HTTP API via the Cilium Gateway.
  # Use this so Grafana can reach Thanos as a datasource from outside the cluster,
  # or to access the Thanos Query UI from a browser.
  httproute:
    enabled: true # flip to true once Thanos is enabled
    host: chris-thanos.dev.cloud.mattermost.com

  # Alternative to httproute — useful if switching to ALB Ingress Controller.
  # Provides ALB + Route53 record via annotations (external-dns watches the hostname annotation).
  ingress:
    enabled: false
    host: thanos.dev.cloud.mattermost.com
    ingressClass: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: "[{\"HTTPS\":443}]"
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-2:926412419614:\
        certificate/e91b2cf5-6075-49ff-b7b7-fb5adf06541f"
      external-dns.alpha.kubernetes.io/hostname: thanos.dev.cloud.mattermost.com

  storegateway:
    persistence:
      size: 10Gi

  extraValues:
    query:
      # All three components share the same role (S3 read/write on the objstore bucket).
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-thanos"

      # resources and podAntiAffinity inherit from base values
      # Prefer addons-role nodes when present in this cluster
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - addons

    storegateway:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-thanos"

    compactor:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-thanos"

# ------------------------------------------------------------------------------
# Velero — cluster backup and restore to S3
#
# Enabled: daily backup of all namespaces to S3.
# plugin.tag must be compatible with the velero chart version — check release
# notes when bumping either.
# schedules: [] — no scheduled backups in dev; add entries for staging/prod.
# ------------------------------------------------------------------------------
velero:
  enabled: true
  chart:
    version: "11.3.2"

  plugin:
    tag: v1.10.0

  s3:
    bucket: "platform-test-velero-926412419614"
    prefix: "platform-test"

  schedules: [] # example schedule:
  # schedules:
  #   - name: daily-full
  #     cron: "0 3 * * *"   # 03:00 UTC daily
  #     ttl: 720h0m0s        # retain for 30 days

  extraValues:
    serviceAccount:
      server:
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::926412419614:role/platform-test-velero"

# ------------------------------------------------------------------------------
# Wrapper Charts — deploy custom charts from private Helm repos or OCI registries.
# Add new entries here for each wrapper chart you want to deploy.
# The key is the name of the wrapper chart; the value is a dictionary with:
#   enabled: true/false — whether to deploy the chart
#   namespace: namespace to deploy the chart to (default: flux-system)
#   chart:
#     name: chart name
#     version: chart version
#     repo:
#       name: repo name
#       type: repo type (default: default)
#       url: repo URL
#   values: values to pass to the chart (optional)
# ------------------------------------------------------------------------------
wrapperCharts:
  podinfo:
    enabled: true
    namespace: podinfo

    chart:
      name: podinfo
      version: "6.7.1"
      repo:
        name: podinfo
        type: default
        url: https://stefanprodan.github.io/podinfo

    values:
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
