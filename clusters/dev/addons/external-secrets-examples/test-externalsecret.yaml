# ==============================================================================
# Test ExternalSecret — dev-app-mattermost
#
# Validates that External Secrets Operator can reach AWS Secrets Manager via the
# aws-secretsmanager ClusterSecretStore (IRSA-authenticated).
#
# dataFrom pulls every JSON key from the secret and creates matching keys in the
# target Kubernetes Secret — no need to enumerate properties upfront.
#
# To verify after reconcile:
#   kubectl get externalsecret dev-app-mattermost -n external-secrets
#   kubectl get secret dev-app-mattermost -n external-secrets -o yaml
# ==============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dev-app-mattermost
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: dev-app-mattermost
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev-app-mattermost
