apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helmrelease.yaml

# values.yaml lives here so Flux automatically regenerates flux-addons-values-dev
# on every git push — no manual kubectl apply needed after bootstrap.
# The HelmRelease reads from this ConfigMap via valuesFrom.
configMapGenerator:
  - name: flux-addons-values-dev
    namespace: flux-system
    files:
      - values.yaml=values.yaml
    options:
      disableNameSuffixHash: true
