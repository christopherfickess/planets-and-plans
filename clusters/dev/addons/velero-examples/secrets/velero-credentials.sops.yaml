# ==============================================================================
# Velero AWS credentials secret
#
# Only needed if NOT using IRSA. If the cluster has IRSA configured for Velero,
# delete this file and remove it from kustomization.yaml.
#
# Encrypt before committing: sops --encrypt velero-credentials.sops.yaml > velero-credentials.sops.yaml
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: velero-credentials
  namespace: velero    # must match velero.namespace in values.yaml
stringData:
  cloud: |
    [default]
    aws_access_key_id=REPLACE_ME
    aws_secret_access_key=REPLACE_ME
